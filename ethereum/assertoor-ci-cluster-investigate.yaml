        reproduction_matches_prior:
          value: "${{ has(tasks.kurtosis_repro_session.outputs.values.matches_prior) ? tasks.kurtosis_repro_session.outputs.values.matches_prior : false }}"
  launcher_audit:
    needs: [classify, source_dive, kurtosis_repro_session]
    if: "${{ inputs.values.?enable_source_dive.orValue(true) == true && has(tasks.classify.outputs.values.decision) && tasks.classify.outputs.values.decision == 'single-client' && (!(has(tasks.source_dive.outputs.values.cloned) && tasks.source_dive.outputs.values.cloned == true) || !(has(tasks.source_dive.outputs.values.source_surface_confidence) && tasks.source_dive.outputs.values.source_surface_confidence >= 75)) }}"
    uses: dev.wagie/ethereum-package-launcher-audit@1.0.0
    inputs:
      values:
        client_name:
          value: "${{ has(tasks.source_dive.outputs.values.client_name) ? tasks.source_dive.outputs.values.client_name : '' }}"
        bug_hunt_summary:
          value: "${{ has(tasks.kurtosis_repro_session.outputs.values.bug_hunt_summary) ? tasks.kurtosis_repro_session.outputs.values.bug_hunt_summary : '' }}"
        root_cause_description:
          value: "${{ has(tasks.source_dive.outputs.values.root_cause_description) ? tasks.source_dive.outputs.values.root_cause_description : '' }}"
      secrets:
        gh_token:
          ref: inputs.secrets.gh_token
