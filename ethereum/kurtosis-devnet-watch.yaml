kind: Template
schemaVersion: wagie/v1
id: dev.wagie/kurtosis-devnet-watch
version: "0.1.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when you have a panda-compute snapshot of a devnet and want to restore it,
  watch each consensus and execution client plus overall network health
  (participation, finality, node logs) for a number of epochs, snapshot the final
  state, and report any issues found.
tags: ["kurtosis", "ethereum", "ethpandaops", "devnet", "snapshot", "restore", "watch", "health", "epoch", "panda-compute", "sandbox"]
inputs:
  values:
    devnet:
      required: true
      description: Devnet name this snapshot represents, used for reference and snapshot notes
      schema: { type: string }
    snapshot_id:
      required: true
      description: panda-compute snapshot id to restore and watch
      schema: { type: string }
    watch_epochs:
      required: true
      description: How many epochs to watch the network from the restored start epoch
      schema: { type: number }
    sandbox_ttl:
      description: Optional sandbox TTL (e.g. 2h) to bound the restored VM lifetime
      schema: { type: string }
tasks:
  provision:
    quality-gate: "${{ has(outputs.values.sandbox_id) && size(outputs.values.sandbox_id) > 0 && has(outputs.values.enclave) && size(outputs.values.enclave) > 0 && size(outputs.values.cl_clients) > 0 && size(outputs.values.el_clients) > 0 && outputs.values.end_epoch >= outputs.values.start_epoch }}"
    instructions: |-
      Restore the snapshot and establish the shared watch window. Do not modify
      the network.

      - Restore the snapshot to a fresh sandbox:
        `panda compute snapshots restore <snapshot_id>` (add `--ttl` when a TTL is
        given). Restore is async — poll the returned operation until the new
        sandbox is ready, and keep its sandbox id.
      - Get the sandbox connection details via
        `panda compute sandboxes get <sandbox_id>` and connect to the restored
        network.
      - Read the current epoch and slot timing from a beacon node (e.g. its spec
        and head endpoints) — the current epoch is the start epoch and the end
        epoch is start epoch + `watch_epochs`. Every watcher uses the end epoch as
        its stop condition (it stops when the network reaches it).
      - On the sandbox the devnet runs as a kurtosis enclave. Find its name (e.g.
        `kurtosis enclave ls`) and list its services (e.g. `kurtosis enclave
        inspect <enclave>` or `kurtosis service ls`), then pick out the consensus
        and execution nodes rather than assuming them. Service names typically
        encode the layer, an index, and the client pair (such as
        `cl-<i>-<cl>-<el>` and `el-<i>-<el>-<cl>`, where the index pairs a
        consensus node to its execution node); use that as a hint and confirm
        against what is actually running. Emit one entry per node per layer, and
        for each capture its client type, image, and version/commit (e.g. the CL
        `/eth/v1/node/version`, the EL `web3_clientVersion`, and the service image)
        — downstream needs the exact build to investigate.
      - Capture the network setup as `setup`, for the judge downstream: what
        tooling and load is configured — load generators (e.g. spamoor, tx_fuzz)
        that drive transactions/blobs, builders (e.g. buildoor for ePBS), and other
        services present — plus the fork schedule and any notable network params.
        This lets the judge know, for example, that with no load generator present
        empty blocks are expected.

      Return the sandbox id, the enclave name, the consensus and execution client
      lists, the start and end epochs, and the setup summary. Downstream tasks are
      isolated and only get these values, so they need the enclave name to address
      the nodes.
    inputs:
      values:
        snapshot_id:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.snapshot_id }}"
        watch_epochs:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.watch_epochs }}"
        sandbox_ttl:
          schema: { type: string }
          value: "${{ inputs.values.?sandbox_ttl.orValue('') }}"
    outputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string, description: panda-compute sandbox id of the restored network }
        enclave:
          required: true
          schema: { type: string, description: kurtosis enclave name running the devnet on the sandbox }
        cl_clients:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                node: { type: string }
                client: { type: string }
                image: { type: string }
                version: { type: string }
              required: [node]
            description: Consensus client nodes to watch (with build info), one entry per node
        el_clients:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                node: { type: string }
                client: { type: string }
                image: { type: string }
                version: { type: string }
              required: [node]
            description: Execution client nodes to watch (with build info), one entry per node
        start_epoch:
          required: true
          schema: { type: number, description: Epoch the network was at when watching began }
        end_epoch:
          required: true
          schema: { type: number, description: Epoch the watch window ends at (start + watch_epochs) }
        setup:
          required: true
          schema: { type: string, description: Summary of the network setup (tooling, load generators, builders, fork schedule) for the judge }
  watch_consensus:
    needs: [provision]
    inputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        enclave:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.enclave }}"
        end_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.end_epoch }}"
    matrix:
      axes:
        client:
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.provision.outputs.values.cl_clients }}"
    tasks:
      watch_cl_one:
        instructions: |-
          Observe a single consensus client node until the network reaches the end
          epoch, then report what you saw. Report observations only — do not judge
          whether they are problems; that is done in collate. Do not snapshot.

          - Connect to the sandbox (`panda compute sandboxes get <sandbox_id>`); the
            devnet runs there as a kurtosis enclave (`enclave`), and this node is a
            service within it. Focus on its consensus side: its beacon node and, if
            present, a separate validator client. Some clients embed the validator
            in the beacon process, so a dedicated validator service may not exist —
            in that case the beacon logs carry the validator activity.
          - Resolve the beacon API endpoint by service/port name (e.g. `kurtosis
            port print <enclave> <node> <port>`) rather than a fixed port (ports
            differ between clients). Track the network's current epoch from it and
            watch until the end epoch.
          - Each epoch, observe this node's consensus-layer behavior: recent
            logs (a bounded tail, e.g. `kurtosis service logs <enclave> <node>`, optionally filtered
            for errors/panics/restarts — do not follow) from the beacon and any
            validator; check attestation and proposal performance and sync-committee
            participation; its head/finality view; and peer count and sync status.
            Per-client metrics are also available where exposed (e.g. Prometheus);
            use logs, metrics, or both as fits.
          - Record each notable observation tagged with the node, the slot or block
            it relates to, the sandbox-clock timestamp, and a short summary of what
            you saw (a fact, not a verdict).

          Return a result for this node with its observations (empty if nothing
          notable).
        inputs:
          values:
            client:
              required: true
              schema: { type: object }
              value: "${{ matrix.client }}"
            sandbox_id:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.sandbox_id }}"
            enclave:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.enclave }}"
            end_epoch:
              required: true
              schema: { type: number }
              value: "${{ inputs.values.end_epoch }}"
        outputs:
          values:
            result:
              required: true
              schema:
                type: object
                properties:
                  node: { type: string }
                  client: { type: string }
                  observations:
                    type: array
                    items:
                      type: object
                      properties:
                        slot: { type: number }
                        epoch: { type: number }
                        timestamp: { type: string }
                        summary: { type: string }
                      required: [summary]
                required: [observations]
                description: Per-node consensus observations (neutral facts, judged in collate)
    outputs:
      values:
        cl_results:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.watch_cl_one.outputs.values.result }}"
  watch_execution:
    needs: [provision]
    inputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        enclave:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.enclave }}"
        end_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.end_epoch }}"
    matrix:
      axes:
        client:
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.provision.outputs.values.el_clients }}"
    tasks:
      watch_el_one:
        instructions: |-
          Observe a single execution client node until the network reaches the end
          epoch, then report what you saw. Report observations only — do not judge
          whether they are problems; that is done in collate. Do not snapshot.

          - Connect to the sandbox (`panda compute sandboxes get <sandbox_id>`); the
            devnet runs there as a kurtosis enclave (`enclave`), and this node is a
            service within it. Focus on its execution client. Resolve its RPC
            endpoint by service/port name (e.g. `kurtosis port print <enclave>
            <node> <port>`) rather than a fixed port (ports differ between clients).
          - Track the network's current epoch from a beacon node and watch until
            it reaches the end epoch.
          - The execution layer is block-based — it has no slots or epochs, so tag
            execution observations by block number (with the block's timestamp).
          - As the network advances, observe this node's execution-layer behavior:
            recent logs (a bounded tail, e.g. `kurtosis service logs <enclave> <node>`, optionally filtered
            for errors/panics/restarts — do not follow); block import and
            production; transaction pool behavior; engine-API payload and forkchoice
            exchange with its consensus client; and peer count and sync status.
            Per-client metrics are also available where exposed (e.g. Prometheus);
            use logs, metrics, or both as fits.
          - Record each notable observation tagged with the node, the slot or block
            it relates to, the sandbox-clock timestamp, and a short summary of what
            you saw (a fact, not a verdict).

          Return a result for this node with its observations (empty if nothing
          notable).
        inputs:
          values:
            client:
              required: true
              schema: { type: object }
              value: "${{ matrix.client }}"
            sandbox_id:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.sandbox_id }}"
            enclave:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.enclave }}"
            end_epoch:
              required: true
              schema: { type: number }
              value: "${{ inputs.values.end_epoch }}"
        outputs:
          values:
            result:
              required: true
              schema:
                type: object
                properties:
                  node: { type: string }
                  client: { type: string }
                  observations:
                    type: array
                    items:
                      type: object
                      properties:
                        block: { type: number }
                        timestamp: { type: string }
                        summary: { type: string }
                      required: [summary]
                required: [observations]
                description: Per-node execution observations (block-based; neutral facts, judged in collate)
    outputs:
      values:
        el_results:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.watch_el_one.outputs.values.result }}"
  watch_network:
    needs: [provision]
    instructions: |-
      Observe overall network behavior until the end epoch, then report what you
      saw. Report observations only — do not judge whether they are problems; that
      is done in collate. Do not snapshot — that is handled by a sibling task.

      - Connect to the sandbox (`panda compute sandboxes get <sandbox_id>`); the
        devnet runs there as a kurtosis enclave (`enclave`). Resolve node endpoints
        within it by service/port name (e.g. `kurtosis port print <enclave>
        <service> <port>`).
      - Track the network's current epoch from a beacon node and watch until it
        reaches the end epoch.
      - Each epoch, observe and record network-wide measurements and events:
        - Consensus: head progression, justification/finalization, attestation and
          sync-committee participation, missed slots/blocks, reorgs, whether all
          nodes agree on the head, slashings, and validator-lifecycle activity
          (deposits, exits, withdrawals, consolidations). On networks with
          enshrined proposer-builder separation (e.g. Gloas), also whether proposed
          blocks have their execution payload present.
        - Execution and data availability: block fullness/gas used, transactions
          included, blob counts, and mempool depth (pending/queued). Report the
          numbers as observed — do not decide whether empty blocks or an idle
          mempool are a problem; collate judges that against demand.
      - Use the devnet's own tooling where available — e.g. dora for
        participation, proposals, and missed blocks; forky for fork-choice;
        tracoor for invalid/bad blocks and blobs; assertoor for automated test
        verdicts; and Prometheus for metrics — alongside direct beacon and
        execution queries.
      - Record each observation with its epoch and slot (and block, for execution
        observations), the sandbox-clock timestamp, and a short summary of what you
        saw (a fact, not a verdict). The timestamp lets the judge line up
        consensus, execution, and log events on one timeline.

      Return the network-level observations (empty if nothing notable).
    inputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        enclave:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.enclave }}"
        end_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.end_epoch }}"
        devnet:
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
    outputs:
      values:
        network_observations:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                epoch: { type: number }
                slot: { type: number }
                block: { type: number }
                timestamp: { type: string }
                summary: { type: string }
              required: [summary]
            description: Network-wide observations (neutral facts, judged in collate)
  snapshot_final:
    needs: [provision]
    quality-gate: "${{ has(outputs.values.final_snapshot) && size(outputs.values.final_snapshot) > 0 }}"
    instructions: |-
      Snapshot the network's final state once it reaches the end epoch. This task
      owns the single final snapshot.

      - Connect to the sandbox (`panda compute sandboxes get <sandbox_id>`); the
        devnet runs there as a kurtosis enclave (`enclave`). Track the network's
        current epoch from a beacon node in it (resolve its endpoint by
        service/port name).
      - When the network reaches the end epoch, snapshot the final state from the
        orchestrator side with `panda compute`:
        `panda compute sandboxes snapshot <sandbox_id> --note "<devnet> watch end epoch <end>"`.
        Snapshots are async — poll the operation and resolve the resulting
        snapshot id.

      Return the final snapshot id.
    inputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        enclave:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.enclave }}"
        end_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.end_epoch }}"
        devnet:
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
    outputs:
      values:
        final_snapshot:
          required: true
          schema: { type: string, description: Snapshot id captured at the end of the watch window }
  collate:
    needs: [provision, watch_consensus, watch_execution, watch_network, snapshot_final]
    quality-gate: "${{ has(outputs.values.issues) }}"
    instructions: |-
      Judge the collected observations and produce a list of issues. The per-node
      and network watchers report neutral observations; this step decides which are
      real problems and describes each as a self-contained issue a downstream
      template can replicate and bug-hunt without further context.

      - Consider all observations together: the network ones and every node's
        consensus and execution ones. Correlate using the sandbox-clock timestamp
        to line up consensus (slot/epoch), execution (block), and log events on one
        timeline; the same observation across many nodes at the same time is likely
        one issue, not many.
      - Use the `setup` summary as the baseline for what is normal — e.g. with no
        load generator configured, empty blocks and an idle mempool are expected,
        not issues. Judge execution throughput against the setup and demand (flag
        inclusion only when expected load is not landing).
      - Judge consensus liveness and safety problems as issues: head not advancing,
        justification/finalization stalling, low/dropping participation, missed
        slots/blocks, reorgs, nodes disagreeing on the head or on a block's result,
        slashings, stuck validator-lifecycle queues, or (on ePBS/Gloas) proposed
        blocks missing their execution payload.
      - When implementations diverge, describe it as a neutral disagreement, not a
        verdict. Record which clients produced which result as separate positions —
        do NOT label the minority as the bad client. A 2-vs-1 split may be two
        clients sharing a bug and one correct; deciding who is right is the bug
        hunt's job, given the snapshot.
      - Make each issue self-contained: its involved components (each with node,
        role, client type, image, and version/commit, resolved from `cl_clients` /
        `el_clients`), the disagreement positions when relevant, anchored evidence
        (slot/block/detail), the time window, and the broken-state snapshot to
        restore.
      - You may connect to the sandbox to verify or disambiguate a borderline
        observation before deciding — `panda compute sandboxes get <sandbox_id>`,
        the devnet running there as a kurtosis enclave (`enclave`); e.g. query the
        relevant slot/epoch or re-check a node's logs. Do this only when ambiguous.

      Return the list of issues (empty if the network stayed healthy).
    inputs:
      values:
        cl_results:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.watch_consensus.outputs.values.cl_results }}"
        el_results:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.watch_execution.outputs.values.el_results }}"
        network_observations:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.watch_network.outputs.values.network_observations }}"
        cl_clients:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.provision.outputs.values.cl_clients }}"
        el_clients:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ tasks.provision.outputs.values.el_clients }}"
        final_snapshot:
          required: true
          schema: { type: string }
          value: "${{ tasks.snapshot_final.outputs.values.final_snapshot }}"
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        enclave:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.enclave }}"
        setup:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.setup }}"
        start_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.start_epoch }}"
        end_epoch:
          required: true
          schema: { type: number }
          value: "${{ tasks.provision.outputs.values.end_epoch }}"
        devnet:
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
    outputs:
      values:
        issues:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string, description: "e.g. consensus-split, finality-stall, invalid-block, payload-absent, execution-mismatch, client-crash, missed-proposals, lifecycle-stuck, performance, tooling, unknown" }
                layer: { type: string, description: "consensus | execution | network | tooling | cross-layer" }
                spread: { type: string, description: "extent not blame: single-client | subset | all-clients | network-wide" }
                components:
                  type: array
                  items:
                    type: object
                    properties:
                      node: { type: string }
                      role: { type: string, description: "cl | el | vc | builder | tool" }
                      client: { type: string }
                      image: { type: string }
                      version: { type: string }
                disagreement:
                  type: object
                  properties:
                    on: { type: string }
                    positions:
                      type: array
                      items:
                        type: object
                        properties:
                          produced: { type: string }
                          participants: { type: array, items: { type: string } }
                evidence:
                  type: array
                  items:
                    type: object
                    properties:
                      source: { type: string }
                      slot: { type: number }
                      block: { type: number }
                      detail: { type: string }
                window:
                  type: object
                  properties:
                    first:
                      type: object
                      properties:
                        slot: { type: number }
                        block: { type: number }
                    last:
                      type: object
                      properties:
                        slot: { type: number }
                        block: { type: number }
                snapshot: { type: string }
              required: [title]
            description: Self-contained issues for downstream replicate + bug-hunt, empty if healthy
outputs:
  values:
    sandbox_id:
      required: true
      schema: { type: string }
      value: "${{ tasks.provision.outputs.values.sandbox_id }}"
    start_epoch:
      required: true
      schema: { type: number }
      value: "${{ tasks.provision.outputs.values.start_epoch }}"
    end_epoch:
      required: true
      schema: { type: number }
      value: "${{ tasks.provision.outputs.values.end_epoch }}"
    final_snapshot:
      required: true
      schema: { type: string }
      value: "${{ tasks.snapshot_final.outputs.values.final_snapshot }}"
    issues:
      required: true
      schema:
        type: array
        items:
          type: object
          properties:
            title: { type: string }
            description: { type: string }
            category: { type: string }
            layer: { type: string }
            spread: { type: string }
            components:
              type: array
              items:
                type: object
                properties:
                  node: { type: string }
                  role: { type: string }
                  client: { type: string }
                  image: { type: string }
                  version: { type: string }
            disagreement:
              type: object
              properties:
                on: { type: string }
                positions:
                  type: array
                  items:
                    type: object
                    properties:
                      produced: { type: string }
                      participants: { type: array, items: { type: string } }
            evidence:
              type: array
              items:
                type: object
                properties:
                  source: { type: string }
                  slot: { type: number }
                  block: { type: number }
                  detail: { type: string }
            window:
              type: object
              properties:
                first:
                  type: object
                  properties:
                    slot: { type: number }
                    block: { type: number }
                last:
                  type: object
                  properties:
                    slot: { type: number }
                    block: { type: number }
            snapshot: { type: string }
          required: [title]
      value: "${{ tasks.collate.outputs.values.issues }}"
