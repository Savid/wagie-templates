kind: Template
schemaVersion: wagie/v1
id: dev.wagie/code-diff
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a git diff is needed between two refs; clones the repo, determines
  the target ref automatically if not provided, and produces a diff artifact
  for downstream review templates.
tags: ["code-review", "diff", "git"]
inputs:
  values:
    repo:
      required: true
      description: "Source repository (owner/name or full URL)"
      schema: { type: string }
    source_ref:
      required: true
      description: "Source branch, tag, or commit SHA to diff"
      schema: { type: string }
    target_repo:
      description: "Target repository if different from source (for cross-fork diffs)"
      schema: { type: string }
    target_ref:
      description: "Target branch, tag, or commit to diff against. If omitted, the worker determines the default branch (main/master) automatically."
      schema: { type: string }
tasks:
  extract_diff:
    quality-gate: "${{ has(outputs.values.files_changed) && outputs.values.files_changed >= 0 && has(outputs.values.summary) && size(outputs.values.summary) > 0 }}"
    instructions: |
      Produce a git diff between two refs in a repository. You need a worker
      with tool-use (shell and git access).

      Steps:
      1. Clone the source repo. Use `git clone --no-checkout` then fetch
         both refs to avoid checking out the entire tree unnecessarily.
      2. If target_ref is empty, determine the repository's default branch:
         `git symbolic-ref refs/remotes/origin/HEAD | sed 's|refs/remotes/origin/||'`
         If that fails, try: `git remote show origin | grep 'HEAD branch' | awk '{print $NF}'`
      3. If target_repo is provided and different from the source repo,
         add it as a second remote and fetch the target_ref from there.
      4. Produce the diff. Use the THREE-DOT form to get changes since
         the refs diverged, not the two-dot form:
         `git diff <target_ref>...<source_ref>`
         This correctly shows new files as full additions.
      5. Write the full diff output to the diff output.
      6. Get stats with: `git diff --stat <target_ref>...<source_ref>`

      IMPORTANT: Do NOT use `git diff --no-index` or any form that
      excludes new files. The three-dot `...` range with resolved refs
      handles new files correctly — they appear as new file diffs with
      full content.
    inputs:
      values:
        repo:
          schema: { type: string }
          value: "${{ inputs.values.repo }}"
        source_ref:
          schema: { type: string }
          value: "${{ inputs.values.source_ref }}"
        target_repo:
          schema: { type: string }
          value: "${{ inputs.values.?target_repo.orValue('') }}"
        target_ref:
          schema: { type: string }
          value: "${{ inputs.values.?target_ref.orValue('') }}"
    outputs:
      values:
        diff:
          required: true
          schema: { type: string, description: Git diff output between target and source refs }
        files_changed:
          required: true
          schema: { type: number, description: Number of files changed }
        insertions:
          required: true
          schema: { type: number, description: Lines added }
        deletions:
          required: true
          schema: { type: number, description: Lines removed }
        summary:
          required: true
          schema: { type: string, description: One-line summary of the diff (e.g. "42 files changed, 1200 insertions, 300 deletions") }
outputs:
  values:
    diff:
      required: true
      schema: { type: string }
      value: "${{ tasks.extract_diff.outputs.values.diff }}"
    files_changed:
      required: true
      schema: { type: number }
      value: "${{ tasks.extract_diff.outputs.values.files_changed }}"
    insertions:
      required: true
      schema: { type: number }
      value: "${{ tasks.extract_diff.outputs.values.insertions }}"
    deletions:
      required: true
      schema: { type: number }
      value: "${{ tasks.extract_diff.outputs.values.deletions }}"
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.extract_diff.outputs.values.summary }}"
