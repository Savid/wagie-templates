              schema:
                type: string
                description: Why the loop ended — one of improvement, patience, plateau, max_iterations, no_improvement
            summary:
              required: true
              schema:
                type: string
                description: Short executive summary suitable for a PR description
            experiment_log_artifact:
              required: true
              schema:
                type: string
                description: Iteration-by-iteration TSV log
            progress_report:
              required: true
              schema:
                type: string
                description: In-depth markdown report with iteration table and progress chart (or ASCII fallback)
      cleanup:
        if: "${{ inputs.values.auto_cleanup == true }}"
        needs: [finalize, setup]
        quality-gate: "${{ has(outputs.values.removed) }}"
        instructions: |-
          Remove the workspace at `workspace_path`. Do not touch anything outside it. Refuse to proceed if `workspace_path` is empty, `/`, or `$HOME`.

          Requires a worker with tool-use.
        inputs:
          values:
            workspace_path:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.workspace_path }}"
        outputs:
          values:
            removed:
              required: true
              schema:
                type: boolean
                description: Whether the scratch workspace was successfully removed
