kind: Template
schemaVersion: wagie/v1
id: dev.wagie/kurtosis-enclave-cleanup
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a workflow needs to remove a Kurtosis enclave cleanly; tears down the enclave and summarizes the result.
tags: ["kurtosis", "ethereum", "ethpandaops", "cleanup"]
inputs:
  values:
    enclave_name:
      required: true
      description: Kurtosis enclave to remove
      schema: { type: string }
    force:
      description: Whether to force enclave removal
      schema: { type: boolean, default: true }
tasks:
  cleanup_enclave:
    quality-gate: "${{ has(outputs.values.removed) }}"
    instructions: |-
      Remove the requested Kurtosis enclave.

      Use the `kurtosis` CLI as the primary tool surface for this task.
      Prefer the normal enclave removal flow and summarize the result clearly.

      A worker with tool-use is required.
    inputs:
      values:
        enclave_name:
          schema: { type: string }
          value: "${{ inputs.values.enclave_name }}"
        force:
          schema: { type: boolean }
          value: "${{ inputs.values.?force.orValue(true) }}"
    outputs:
      values:
        removed:
          required: true
          schema: { type: boolean, description: Whether the enclave was removed successfully }
        summary:
          required: true
          schema: { type: string, description: Cleanup summary }
outputs:
  values:
    removed:
      required: true
      schema: { type: boolean }
      value: "${{ tasks.cleanup_enclave.outputs.values.removed }}"
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.cleanup_enclave.outputs.values.summary }}"
