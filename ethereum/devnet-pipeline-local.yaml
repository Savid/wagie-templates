kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-pipeline-local
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use to run the full Ethereum devnet reproduce-and-analyze pipeline end to end with NO panda-compute: build a Kurtosis config from a hosted devnet, launch it locally, watch it for a window, then root-cause every issue it surfaces. An all-in-one convenience over the individual devnet stages, for when you don't want remote compute.
tags: ["ethereum", "devnet", "kurtosis", "pipeline", "local", "no-compute", "watch", "investigate"]
examples:
  - "copy hosted devnet X locally and watch issues"
  - "run local no-compute devnet pipeline end to end"
  - "reproduce hosted devnet in local Kurtosis only"
  - "from devnet name to local RCA reports"
inputs:
  values:
    devnet:
      required: true
      description: Hosted devnet name to reproduce locally, e.g. glamsterdam-devnet-6
      schema: { type: string }
    steering:
      description: Optional config steering (client subset, tooling, accelerated forks)
      schema: { type: string }
    package_ref:
      description: Optional override for the Kurtosis package reference, threaded to config synthesis and the local launch
      schema: { type: string }
    watch_epochs:
      description: How many epochs to watch the local network (default 5)
      schema: { type: number, default: 5 }
tasks:
  config:
    uses: dev.wagie/devnet-config@1.0.0
    inputs:
      values:
        devnet:
          value: "${{ inputs.values.devnet }}"
        steering:
          value: "${{ inputs.values.?steering.orValue('') }}"
        package_ref:
          value: "${{ inputs.values.?package_ref.orValue('') }}"
  run_local:
    needs: [config]
    uses: dev.wagie/devnet-run-local@1.0.0
    inputs:
      values:
        package_ref:
          value: "${{ inputs.values.?package_ref.orValue('') }}"
        launch_requirements:
          value: "${{ tasks.config.outputs.values.launch_requirements }}"
      artifacts:
        config:
          ref: tasks.config.outputs.artifacts.config
  watch:
    needs: [run_local]
    uses: dev.wagie/devnet-watch@1.0.0
    inputs:
      values:
        devnet:
          value: "${{ inputs.values.devnet }}"
        network_target:
          value: "${{ tasks.run_local.outputs.values.network_target }}"
        watch_epochs:
          value: "${{ inputs.values.?watch_epochs.orValue(5) }}"
  investigate:
    needs: [watch]
    inputs:
      values:
        network_target:
          required: true
          schema: &network_target_schema
            type: object
            properties:
              kind: { type: string, description: local | compute | public — owned by the runbook that owns debugging an Ethereum network (its tooling kind never reaches a watch) }
              enclave: { type: string }
              sandbox_id: { type: string }
              network_id: { type: string, description: "Public network id, when known" }
            required: [kind]
          value: "${{ tasks.watch.outputs.values.network_target }}"
    matrix:
      axes:
        issue:
          schema:
            type: array
            items: &issue_item_schema
              type: object
              properties:
                title: { type: string }
                summary: { type: string, description: "Free-text reasoning, written first" }
                classification:
                  type: object
                  properties:
                    category: { type: string, description: Failure mode — enum owned by the issue-contract runbook }
                    layer: { type: string, description: consensus | execution | network | tooling | cross-layer }
                    spread: { type: string, description: single-client | subset | all-clients | network-wide | unknown }
                    severity: { type: string, description: "Impact rank critical | major | minor — distinct from confidence; scale owned by the issue-contract runbook" }
                first_bad:
                  type: object
                  description: Earliest artifact that explains later symptoms
                  properties:
                    kind: { type: string, description: slot | block | epoch | log | rpc | test | service-state }
                    value: { type: string }
                    at: { type: string }
                affected:
                  type: array
                  items:
                    type: object
                    properties:
                      node: { type: string }
                      role: { type: string }
                      client: { type: string }
                      image: { type: string }
                evidence:
                  type: array
                  items: &evidence_item_schema
                    type: object
                    properties:
                      source: { type: string, description: Tool or datasource that produced it }
                      ref: { type: string, description: Executable re-derivation — a reader can re-run it }
                      at: { type: string, description: "Slot, block, epoch, or timestamp anchoring it" }
                      detail: { type: string, description: "What was observed, verbatim values preserved" }
                    required: [source, ref, detail]
                co_present:
                  type: array
                  items: { type: string }
                  description: Co-present distractor signals, kept out of the root narrative
                fingerprint:
                  type: object
                  description: Identity block owned by the fingerprinting runbook — no run-specific ids in the key
                  properties:
                    rationale: { type: string }
                    key: { type: string }
                    decision: { type: string, description: new | duplicate | variant | insufficient-context }
                    matched: { type: string }
                    variant_dimension: { type: string }
                    confidence: { type: string }
                handles:
                  type: object
                  description: What lets an investigation restore or reach the broken state — fill only the id kinds that exist
                  properties:
                    snapshot_id: { type: string }
                    sandbox_id: { type: string }
                    enclave: { type: string }
                    network: { type: string, description: Source or hosted network id }
                    setup_summary:
                      type: object
                      description: Watch setup_summary copied whole — reproduction and reachability judge against it
                      properties:
                        fork_schedule:
                          type: object
                          description: Fork name to activation epoch
                          additionalProperties: { type: number }
                        blob_schedule:
                          type: object
                          description: Max blobs per block by fork name
                          additionalProperties: { type: number }
                        load: { type: array, items: { type: string }, description: Load generators or applied transaction load }
                        builders: { type: array, items: { type: string } }
                confidence: { type: string, description: Scale owned by the evidence-discipline runbook }
              required: [title, summary]
          # duplicates are surfaced in the issues output but not re-investigated
          # (fingerprint-before-expensive-work, per the root-cause runbook)
          value: "${{ tasks.watch.outputs.values.issues.filter(i, i.?fingerprint.?decision.orValue('') != 'duplicate') }}"
    tasks:
      one:
        uses: dev.wagie/devnet-issue-investigate@1.0.0
        inputs:
          values:
            issue:
              value: "${{ matrix.issue }}"
            network_target:
              value: "${{ inputs.values.network_target }}"
    outputs:
      values:
        investigations:
          required: true
          schema:
            type: array
            items: &report_schema
              type: object
              properties:
                summary: { type: string, description: "Reasoning in prose, written first" }
                root_cause:
                  type: object
                  properties:
                    statement: { type: string }
                    family: { type: string }
                    confidence: { type: string, description: "high | medium | low, on the evidence-discipline scale" }
                  required: [statement, confidence]
                reproduction:
                  type: object
                  properties:
                    status: { type: string, description: reproduced | partial | not-reproduced | local-live | public-live | tooling-live | historical-only }
                    recipe: { type: array, items: { type: string } }
                  required: [status]
                timeline:
                  type: array
                  items:
                    type: object
                    properties:
                      ts: { type: string }
                      kind: { type: string, description: restart | block | timing | log | note }
                      text: { type: string }
                      log: { type: string }
                    required: [text]
                hypotheses:
                  type: object
                  properties:
                    supported: { type: array, items: { type: string } }
                    rejected: { type: array, items: { type: string } }
                    partial: { type: array, items: { type: string } }
                trace_verdict: { type: string, description: reachable | partially-reachable | not-reachable | insufficient-evidence }
                review_verdict: { type: string, description: survives | weakened | refuted }
                citations:
                  type: array
                  items: *evidence_item_schema
                feedback: { type: object, description: "Embedded follow-up queue, identical to the sibling feedback output — shape owned by the feedback-queue runbook" }
                next_action: { type: string, description: file client bug | spec issue | config fix | tooling fix | experiment triage | rerun with more evidence | no issue reproduced }
              required: [summary, root_cause, reproduction, trace_verdict, review_verdict, next_action]
          value: "${{ tasks.one.outputs.values.report }}"
        feedback:
          required: true
          schema: &feedback_matrix_schema
            type: array
            description: Follow-up queue per investigated issue, parallel to investigations — shape owned by the feedback-queue runbook
            items: &feedback_schema
              type: object
              properties:
                priority_summary: { type: string }
                terminal: { type: boolean }
                terminal_reason: { type: string }
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      kind: { type: string, description: watch | investigate | config | snapshot | source-trace | reachability-trace | experiment-triage | manual-review | publish | no-op }
                      reason: { type: string }
                      priority: { type: string, description: high | medium | low }
                      inputs: { type: object, description: "Handles and query params only, values stringified", additionalProperties: { type: string } }
                      success_condition: { type: string }
                      stop_condition: { type: string }
                      runbook_refs: { type: array, items: { type: string } }
                      blocked_by: { type: string }
                    required: [kind, reason, success_condition, stop_condition]
              required: [tasks]
          value: "${{ tasks.one.outputs.values.feedback }}"
        investigated_issues:
          required: true
          schema:
            type: array
            description: The canonical issue record each investigation ran on, parallel to investigations — pairs reports back to issues across the duplicate filter
            items: *issue_item_schema
          value: "${{ tasks.one.outputs.values.canonical_issue }}"
outputs:
  values:
    config_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.config.outputs.values.summary }}"
    config_assumptions:
      required: true
      schema: { type: array, items: { type: string }, description: "Assumptions or unresolved gaps from config synthesis, including source inconsistencies" }
      value: "${{ tasks.config.outputs.values.assumptions }}"
    config_deviations:
      required: true
      schema: { type: array, items: { type: string }, description: "Steering-driven deviations from the hosted network — config-fidelity context for judging downstream issues" }
      value: "${{ tasks.config.outputs.values.deviations }}"
    config_dry_run:
      required: true
      schema:
        type: object
        properties:
          attempted: { type: boolean }
          command: { type: string }
          passed: { type: boolean }
        required: [attempted]
      value: "${{ tasks.config.outputs.values.dry_run }}"
    network_target:
      required: true
      schema: *network_target_schema
      value: "${{ tasks.run_local.outputs.values.network_target }}"
    issues:
      required: true
      schema:
        type: array
        items: *issue_item_schema
      value: "${{ tasks.watch.outputs.values.issues }}"
    healthy_window_summary:
      required: true
      schema: { type: string, description: "One paragraph instead of issues when the watch window was healthy, else empty" }
      value: "${{ tasks.watch.outputs.values.healthy_window_summary }}"
    watch_notes:
      required: true
      schema: { type: string, description: "Reach/coverage caveats for the watch window, empty when none" }
      value: "${{ tasks.watch.outputs.values.notes }}"
    watch_feedback:
      required: true
      schema: *feedback_schema
      value: "${{ tasks.watch.outputs.values.feedback }}"
    investigations:
      required: true
      schema:
        type: array
        items: *report_schema
      value: "${{ tasks.investigate.outputs.values.investigations }}"
    feedback:
      required: true
      schema: *feedback_matrix_schema
      value: "${{ tasks.investigate.outputs.values.feedback }}"
    investigated_issues:
      required: true
      schema:
        type: array
        description: The canonical issue record each investigation ran on, parallel to investigations
        items: *issue_item_schema
      value: "${{ tasks.investigate.outputs.values.investigated_issues }}"
