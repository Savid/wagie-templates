    improvement_pct:
      required: true
      schema: { type: number }
      value: >-
        ${{ inputs.values.?metric_direction.orValue('minimize') == 'minimize'
              ? (tasks.experiment.outputs.values.baseline_metric - tasks.experiment.outputs.values.best_metric) / tasks.experiment.outputs.values.baseline_metric * 100.0
              : (tasks.experiment.outputs.values.best_metric - tasks.experiment.outputs.values.baseline_metric) / tasks.experiment.outputs.values.baseline_metric * 100.0 }}
    improved:
      required: true
      schema: { type: boolean }
      value: >-
        ${{ inputs.values.?metric_direction.orValue('minimize') == 'minimize'
              ? tasks.experiment.outputs.values.best_metric < tasks.experiment.outputs.values.baseline_metric
              : tasks.experiment.outputs.values.best_metric > tasks.experiment.outputs.values.baseline_metric }}
