kind: Template
schemaVersion: wagie/v1
id: dev.wagie/kurtosis-ethereum-reference
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a workflow needs targeted ethereum-package reference material; retrieves the specific config, client, service, fork, or example information needed for a Kurtosis task.
tags: ["kurtosis", "ethereum", "ethpandaops", "reference"]
inputs:
  values:
    section:
      required: true
      description: Reference section to retrieve
      schema:
        type: string
        enum: [clients, participants, network, forks, mev, services, sections, search, example, examples]
    query:
      description: Search term or example name when required by the selected section
      schema: { type: string }
    package_ref:
      description: Kurtosis package reference to inspect
      schema: { type: string, default: github.com/ethpandaops/ethereum-package }
tasks:
  fetch_reference:
    quality-gate: "${{ has(outputs.values.reference_summary) && size(outputs.values.reference_summary) > 0 }}"
    instructions: |-
      Retrieve targeted reference material for the ethpandaops ethereum-package.
      A worker with tool-use is required.

      Use the most relevant repo-local package references when available, especially:
      - `.github/tests/*` example configs
      - the package README
      - package configuration sources and defaults

      Behavior:
      - Fetch only the material relevant to the requested section.
      - If the section requires a query, use it exactly and fail clearly if it is missing.
      - Prefer concise, operator-usable output rather than dumping every possible field.
      - Preserve exact field names, supported values, and example names where they matter.
      - Write the full reference material as the `reference` output.
    inputs:
      values:
        section:
          schema: { type: string }
          value: "${{ inputs.values.section }}"
        query:
          schema: { type: string }
          value: "${{ inputs.values.?query.orValue('') }}"
        package_ref:
          schema: { type: string }
          value: "${{ inputs.values.?package_ref.orValue('github.com/ethpandaops/ethereum-package') }}"
    outputs:
      values:
        reference:
          required: true
          schema: { type: string, description: Targeted reference material for the requested section }
        reference_summary:
          required: true
          schema: { type: string, description: Short summary of the most relevant reference points }
        extracted_items:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Key values, field names, or example identifiers extracted from the reference
outputs:
  values:
    reference:
      required: true
      schema: { type: string }
      value: "${{ tasks.fetch_reference.outputs.values.reference }}"
    reference_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.fetch_reference.outputs.values.reference_summary }}"
    extracted_items:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.fetch_reference.outputs.values.extracted_items }}"
