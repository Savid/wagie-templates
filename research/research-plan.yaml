kind: Template
schemaVersion: wagie/v1
id: dev.wagie/research-plan
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a research topic needs structured decomposition before investigation; discovers diverse perspectives and produces a prioritized plan of sub-questions. Research-facing wrapper over the core decompose primitive.
tags: ["research", "planning", "decomposition"]
inputs:
  values:
    topic:
      required: true
      description: The topic to plan research for
      schema: { type: string }
    depth:
      description: >-
        Desired research depth. shallow: 3-5 sub-questions. moderate: 5-10. deep: 10-15.
      schema: { type: string, default: moderate, enum: [shallow, moderate, deep] }
    context:
      description: Optional context or constraints to guide planning
      schema: { type: string }
tasks:
  plan:
    uses: dev.wagie/decompose@1.0.0
    inputs:
      values:
        objective:
          value: "${{ inputs.values.topic }}"
        thoroughness:
          value: "${{ inputs.values.?depth.orValue('moderate') }}"
        context:
          value: "${{ inputs.values.?context.orValue('') }}"
outputs:
  values:
    perspectives:
      required: true
      schema:
        type: array
        items:
          type: object
          properties:
            name: { type: string }
            rationale: { type: string }
          required: [name, rationale]
      value: "${{ tasks.plan.outputs.values.perspectives }}"
    questions:
      required: true
      schema:
        type: array
        items:
          type: object
          properties:
            question: { type: string }
            perspective: { type: string }
            priority: { type: string }
            difficulty: { type: string }
            rationale: { type: string }
          required: [question, perspective, priority, difficulty]
      value: "${{ tasks.plan.outputs.values.subquestions }}"
