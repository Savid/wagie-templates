kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-issue-investigate
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when one observed Ethereum devnet issue — a fork or network split, a finality stall, a crashing or misbehaving client, missing payloads or blobs — needs a root-cause investigation, on a live public (hosted) devnet, a local Kurtosis enclave, or a restored snapshot; given a catalog of epoch snapshots it picks the most useful restore point relative to the failure. Reproduces or attaches to the network, adversarially reviews the hypothesis plan before spending compute, runs a scoped hypothesis hunt, traces reachability before blame, adversarially validates the evidence, and emits a cited report plus a structured follow-up queue. Thin orchestration over Panda runbooks and core patterns.
tags: ["ethereum", "devnet", "root-cause", "investigation", "adversarial", "hosted", "live", "kurtosis", "snapshot"]
examples:
  - "root-cause one observed devnet issue"
  - "root-cause yesterday's finality stall from retained evidence"
  - "investigate evidence-only when reproduction fails"
  - "restore the snapshot nearest before the failure and watch it develop"
  - "trace whether suspected cause reaches the failure"
  - "turn RCA gaps into follow-up tasks"
inputs:
  values:
    issue:
      required: true
      description: The observed issue to investigate
      schema: &issue_schema
        type: object
        properties:
          title: { type: string }
          summary: { type: string, description: Free-text reasoning, written first }
          classification:
            type: object
            properties:
              category: { type: string, description: Failure mode — enum owned by the issue-contract runbook }
              layer: { type: string, description: consensus | execution | network | tooling | cross-layer }
              spread: { type: string, description: single-client | subset | all-clients | network-wide | unknown }
          first_bad:
            type: object
            description: Earliest artifact that explains later symptoms
            properties:
              kind: { type: string, description: slot | block | epoch | log | rpc | test | service-state }
              value: { type: string }
              at: { type: string }
          affected:
            type: array
            items:
              type: object
              properties:
                node: { type: string }
                role: { type: string }
                client: { type: string }
                image: { type: string }
          evidence:
            type: array
            items: &evidence_item_schema
              type: object
              properties:
                source: { type: string, description: Tool or datasource that produced it }
                ref: { type: string, description: Executable re-derivation — a reader can re-run it }
                at: { type: string, description: Slot, block, epoch, or timestamp anchoring it }
                detail: { type: string, description: What was observed, verbatim values preserved }
              required: [source, ref, detail]
          co_present:
            type: array
            items: { type: string }
            description: Co-present distractor signals, kept out of the root narrative
          fingerprint:
            type: object
            description: Identity block owned by the fingerprinting runbook — no run-specific ids in the key
            properties:
              rationale: { type: string }
              key: { type: string }
              decision: { type: string, description: new | duplicate | variant | insufficient-context }
              matched: { type: string }
              variant_dimension: { type: string }
              confidence: { type: string }
          handles:
            type: object
            description: What lets an investigation restore or reach the broken state — fill only the id kinds that exist
            properties:
              snapshot_id: { type: string }
              sandbox_id: { type: string }
              enclave: { type: string }
              network: { type: string, description: Source or hosted network id }
              setup_summary:
                type: object
                description: Fork/blob schedule, load, builders — reproduction and reachability judge against it
          confidence: { type: string, description: Scale owned by the evidence-discipline runbook }
        required: [title, summary]
    network_target:
      description: An already-reproduced or live network to investigate; if absent, one is reproduced
      schema: &network_target_schema
        type: object
        properties:
          kind: { type: string, description: local | compute | public — owned by the runbook that owns debugging an Ethereum network }
          enclave: { type: string }
          sandbox_id: { type: string }
          network_id: { type: string, description: Public network id, when kind is public }
        required: [kind]
    snapshot_id:
      description: Broken-state snapshot to restore when no live target is supplied
      schema: { type: string }
    snapshots:
      description: Optional catalog of epoch-aligned snapshots of the same network, ascending; reproduction picks a restore point relative to the issue's first_bad
      schema: &snapshot_catalog_schema
        type: array
        items:
          type: object
          properties:
            epoch: { type: number }
            snapshot_id: { type: string }
          required: [epoch, snapshot_id]
    max_investigation_rounds:
      description: Gap-filling rounds for the scoped hypothesis hunt
      schema: { type: number, default: 2 }
tasks:
  intake:
    quality-gate: "${{ has(outputs.values.canonical_issue) && has(outputs.values.objective) && size(outputs.values.objective) > 0 }}"
    instructions: |-
      Normalize the input into a single canonical issue to investigate.

      Follow the intake rules of the runbook that owns root-causing a devnet
      issue (via `panda search runbooks "root-cause a devnet issue"`): one
      first-cause issue. The issue-contract runbook owns the record shape; the
      fingerprinting runbook owns identity. Preserve the incoming fingerprint
      and handles verbatim; fill the fingerprint block when absent, and record
      its dedupe decision — a duplicate gets occurrence-attachment, not
      re-investigation, and the report must say so.

      Emit the canonical issue and a one-line objective of the form "Identify
      the first-cause of: <issue>".
    inputs:
      values:
        issue:
          required: true
          schema: *issue_schema
          value: "${{ inputs.values.issue }}"
    outputs:
      values:
        canonical_issue:
          required: true
          schema: *issue_schema
        objective:
          required: true
          schema: { type: string, description: One-line root-cause objective }
  reproduce:
    needs: [intake]
    quality-gate: "${{ has(outputs.values.network_target) && has(outputs.values.access_summary) && size(outputs.values.access_summary) > 0 && has(outputs.values.reproduction) }}"
    instructions: |-
      Establish an investigable network, preferring the strongest handle you
      were given: a supplied network target, else a snapshot (the snapshot_id
      input, the snapshots catalog, or the issue's handles), else reproduce
      from the issue's network handle. When the snapshots catalog offers
      several restore points, choose per the reproduction rules of the runbook
      that owns root-causing a devnet issue — it owns picking between the
      broken state and the latest snapshot before the issue's first_bad.
      Resolve each path's runbook via `panda search runbooks "<need>"`: the
      panda-compute lifecycle for snapshot/restore; running and reaching a
      Kurtosis devnet for local; Kurtosis config synthesis plus hosted devnet
      context intake for a faithful local config; debugging an Ethereum network
      for public-live — it also owns the network_target contract.

      Label the mode honestly with the reproduction status enum of the runbook
      that owns root-causing a devnet issue, and record the recipe that reaches
      the state. If the state cannot be reproduced, set status historical-only
      and proceed on the named historical evidence — do not fabricate a
      reproduction.

      Emit the network target, the reproduction record, and a short
      access_summary a worker can act on.
    inputs:
      values:
        canonical_issue:
          required: true
          schema: *issue_schema
          value: "${{ tasks.intake.outputs.values.canonical_issue }}"
        provided_target:
          schema:
            type: object
            description: Caller-supplied target if any
            properties:
              kind: { type: string }
              enclave: { type: string }
              sandbox_id: { type: string }
              network_id: { type: string }
          value: "${{ inputs.values.?network_target.orValue({}) }}"
        snapshot_id:
          schema: { type: string, description: Broken-state snapshot to restore, when available }
          value: "${{ inputs.values.?snapshot_id.orValue('') }}"
        snapshots:
          schema: *snapshot_catalog_schema
          value: "${{ inputs.values.?snapshots.orValue([]) }}"
    outputs:
      values:
        network_target:
          required: true
          schema: *network_target_schema
        access_summary:
          required: true
          schema: { type: string }
        reproduction:
          required: true
          schema: &reproduction_schema
            type: object
            properties:
              status: { type: string, description: reproduced | partial | not-reproduced | local-live | public-live | historical-only }
              recipe: { type: array, items: { type: string } }
            required: [status]
  plan:
    needs: [intake, reproduce]
    quality-gate: "${{ has(outputs.values.plan) && size(outputs.values.plan) > 0 }}"
    instructions: |-
      Draft the bounded hypothesis plan for the hunt — do not run any tests yet.

      Follow the hypothesis rules of the runbook that owns root-causing a
      devnet issue (find it via `panda search runbooks "root-cause a devnet
      issue"`), with the CL-vs-EL matrix from the runbook that owns debugging
      an Ethereum network.

      Write the plan as one self-contained text: fold in the issue's first_bad
      anchor and its key evidence refs — the hunt workers receive only this
      plan and the access summary.
    inputs:
      values:
        canonical_issue:
          required: true
          schema: *issue_schema
          value: "${{ tasks.intake.outputs.values.canonical_issue }}"
        access_summary:
          required: true
          schema: { type: string }
          value: "${{ tasks.reproduce.outputs.values.access_summary }}"
        reproduction:
          schema: *reproduction_schema
          value: "${{ tasks.reproduce.outputs.values.reproduction }}"
    outputs:
      values:
        plan:
          required: true
          schema: { type: string, description: Self-contained hypothesis plan with tests, observables, and the issue's anchors }
  plan_review:
    needs: [intake, plan]
    uses: dev.wagie/adversarial-review@1.0.0
    inputs:
      values:
        claim:
          value: "${{ 'This hypothesis plan is sufficient to find the first cause: ' + tasks.plan.outputs.values.plan }}"
        context:
          value: "${{ tasks.intake.outputs.values.objective }}"
  investigate:
    # Load-bearing order ("judge twice"): plan_review must gate the hunt, so the
    # adversarial plan review runs before any compute is spent. Do not drop
    # plan_review from these needs.
    needs: [intake, reproduce, plan, plan_review]
    uses: dev.wagie/scoped-discovery@1.0.0
    inputs:
      values:
        target:
          value: "${{ tasks.intake.outputs.values.canonical_issue.summary + ' || Access: ' + tasks.reproduce.outputs.values.access_summary + ' || Plan: ' + tasks.plan.outputs.values.plan + ' || Plan review (' + tasks.plan_review.outputs.values.verdict + '): ' + tasks.plan_review.outputs.values.strongest_counterargument }}"
        objective:
          value: "${{ tasks.intake.outputs.values.objective }}"
        max_gapfill_rounds:
          value: "${{ inputs.values.?max_investigation_rounds.orValue(2) }}"
  synthesize:
    needs: [intake, reproduce, investigate]
    quality-gate: "${{ has(outputs.values.root_cause_claim) && size(outputs.values.root_cause_claim) > 0 && has(outputs.values.evidence) && has(outputs.values.confidence) }}"
    instructions: |-
      From the scoped hunt findings, state the single leading first-cause as one
      clear claim and assemble the evidence for it.

      Follow the runbook that owns root-causing a devnet issue for the claim
      and the one that owns evidence discipline for citations (resolve both via
      `panda search runbooks "<need>"`). If the findings do not support a
      confident cause, say so and name the single piece of evidence that would
      most resolve it.
    inputs:
      values:
        objective:
          schema: { type: string }
          value: "${{ tasks.intake.outputs.values.objective }}"
        findings:
          schema:
            type: array
            items: &finding_schema
              type: object
              properties:
                angle: { type: string }
                summary: { type: string }
                evidence: { type: string }
                severity: { type: string }
              required: [angle, summary]
          value: "${{ tasks.investigate.outputs.values.findings }}"
        coverage_summary:
          schema: { type: string }
          value: "${{ tasks.investigate.outputs.values.coverage_summary }}"
        reproduction:
          schema: *reproduction_schema
          value: "${{ tasks.reproduce.outputs.values.reproduction }}"
    outputs:
      values:
        root_cause_claim:
          required: true
          schema: { type: string }
        evidence:
          required: true
          schema: { type: string }
        confidence:
          required: true
          schema: { type: string, description: high | medium | low }
  trace:
    needs: [intake, reproduce, synthesize]
    quality-gate: "${{ has(outputs.values.reachability) && size(outputs.values.reachability) > 0 }}"
    instructions: |-
      Trace before blame: tie the leading cause to the observed failure.

      Follow the runbook that owns reachability tracing (via
      `panda search runbooks "can this component cause the failure"`) — a
      bounded trace from the candidate cause to the issue's first_bad artifact.
      Escalate to the runbook that owns spec and client source drilldown only
      when its escalation gate demands it.

      Emit the reachability verdict and any source findings.
    inputs:
      values:
        root_cause_claim:
          required: true
          schema: { type: string }
          value: "${{ tasks.synthesize.outputs.values.root_cause_claim }}"
        evidence:
          schema: { type: string }
          value: "${{ tasks.synthesize.outputs.values.evidence }}"
        canonical_issue:
          schema: *issue_schema
          value: "${{ tasks.intake.outputs.values.canonical_issue }}"
        network_target:
          schema: *network_target_schema
          value: "${{ tasks.reproduce.outputs.values.network_target }}"
        access_summary:
          schema: { type: string }
          value: "${{ tasks.reproduce.outputs.values.access_summary }}"
    outputs:
      values:
        reachability:
          required: true
          schema: { type: string, description: reachable | partially-reachable | not-reachable | insufficient-evidence }
        source_findings:
          required: true
          schema: { type: string }
  validate:
    # Load-bearing order ("trace before blame"): trace must precede the adversarial
    # evidence review, so reachability is established before evidence is judged. Keep
    # trace in these needs.
    needs: [investigate, synthesize, trace]
    uses: dev.wagie/adversarial-review@1.0.0
    inputs:
      values:
        claim:
          value: "${{ tasks.synthesize.outputs.values.root_cause_claim }}"
        evidence:
          value: "${{ tasks.synthesize.outputs.values.evidence }}"
        context:
          value: "${{ tasks.investigate.outputs.values.coverage_summary + ' || Reachability: ' + tasks.trace.outputs.values.reachability + ' || Source findings: ' + tasks.trace.outputs.values.source_findings }}"
  report:
    needs: [intake, reproduce, investigate, synthesize, trace, validate]
    quality-gate: "${{ has(outputs.values.report) && has(outputs.values.feedback) }}"
    instructions: |-
      Produce the final root-cause report and the follow-up queue.
      Outputs are the structured values declared below — never an HTML page,
      bug board, or other rendered artifact, even if a retrieved runbook
      offers to build one.

      Assemble the report in the shape owned by the runbook that owns
      root-causing a devnet issue (via `panda search runbooks "root-cause a
      devnet issue"`). Do not overstate — if the review weakened or refuted the
      cause, lead with that and cap confidence; a duplicate fingerprint
      decision gets occurrence-attachment, not re-publication.

      Convert every remaining gap — including the review's missing evidence —
      into the feedback queue per the runbook that owns shaping investigation
      follow-ups.
    inputs:
      values:
        canonical_issue:
          schema: *issue_schema
          value: "${{ tasks.intake.outputs.values.canonical_issue }}"
        access_summary:
          schema: { type: string }
          value: "${{ tasks.reproduce.outputs.values.access_summary }}"
        reproduction:
          schema: *reproduction_schema
          value: "${{ tasks.reproduce.outputs.values.reproduction }}"
        root_cause_claim:
          schema: { type: string }
          value: "${{ tasks.synthesize.outputs.values.root_cause_claim }}"
        confidence:
          schema: { type: string }
          value: "${{ tasks.synthesize.outputs.values.confidence }}"
        verdict:
          schema: { type: string }
          value: "${{ tasks.validate.outputs.values.verdict }}"
        strongest_counterargument:
          schema: { type: string }
          value: "${{ tasks.validate.outputs.values.strongest_counterargument }}"
        missing_evidence:
          schema: { type: string }
          value: "${{ tasks.validate.outputs.values.missing_evidence }}"
        coverage_summary:
          schema: { type: string }
          value: "${{ tasks.investigate.outputs.values.coverage_summary }}"
        reachability:
          schema: { type: string }
          value: "${{ tasks.trace.outputs.values.reachability }}"
        source_findings:
          schema: { type: string }
          value: "${{ tasks.trace.outputs.values.source_findings }}"
    outputs:
      values:
        report:
          required: true
          schema: &report_schema
            type: object
            properties:
              summary: { type: string, description: Reasoning in prose, written first }
              root_cause:
                type: object
                properties:
                  statement: { type: string }
                  family: { type: string }
                  confidence: { type: string, description: high | medium | low, on the evidence-discipline scale }
                required: [statement, confidence]
              reproduction: *reproduction_schema
              timeline:
                type: array
                items:
                  type: object
                  properties:
                    ts: { type: string }
                    kind: { type: string, description: restart | block | timing | log | note }
                    text: { type: string }
                    log: { type: string }
                  required: [text]
              hypotheses:
                type: object
                properties:
                  supported: { type: array, items: { type: string } }
                  rejected: { type: array, items: { type: string } }
                  partial: { type: array, items: { type: string } }
              trace_verdict: { type: string, description: reachable | partially-reachable | not-reachable | insufficient-evidence }
              review_verdict: { type: string, description: survives | weakened | refuted }
              citations:
                type: array
                items: *evidence_item_schema
              next_action: { type: string, description: file client bug | spec issue | config fix | tooling fix | rerun with more evidence | no issue reproduced }
            required: [summary, root_cause, reproduction, trace_verdict, review_verdict, next_action]
        feedback:
          required: true
          schema: &feedback_schema
            type: object
            description: Follow-up queue — shape owned by the feedback-queue runbook
            properties:
              priority_summary: { type: string }
              terminal: { type: boolean }
              terminal_reason: { type: string }
              tasks:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    kind: { type: string, description: watch | investigate | config | snapshot | source-trace | reachability-trace | manual-review | publish | no-op }
                    reason: { type: string }
                    priority: { type: string, description: high | medium | low }
                    inputs: { type: object, description: Handles and query params only }
                    success_condition: { type: string }
                    stop_condition: { type: string }
                    runbook_refs: { type: array, items: { type: string } }
                    blocked_by: { type: string }
                  required: [kind, reason, success_condition, stop_condition]
            required: [tasks]
outputs:
  values:
    report:
      required: true
      schema: *report_schema
      value: "${{ tasks.report.outputs.values.report }}"
    root_cause_claim:
      required: true
      schema: { type: string }
      value: "${{ tasks.synthesize.outputs.values.root_cause_claim }}"
    verdict:
      required: true
      schema: { type: string }
      value: "${{ tasks.validate.outputs.values.verdict }}"
    reachability:
      required: true
      schema: { type: string }
      value: "${{ tasks.trace.outputs.values.reachability }}"
    findings:
      required: true
      schema: { type: array, items: *finding_schema }
      value: "${{ tasks.investigate.outputs.values.findings }}"
    feedback:
      required: true
      schema: *feedback_schema
      value: "${{ tasks.report.outputs.values.feedback }}"
