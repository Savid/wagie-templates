kind: Template
schemaVersion: wagie/v1
id: dev.wagie/assertoor-ci-kurtosis-reproduce
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use to reproduce a previously observed assertoor failure on a Kurtosis-capable worker. The launch and watcher steps are sticky to the same Kurtosis worker; the loop stops early on reproduction or a faithful full-queue blocked outcome and treats non-reproduction as a first-class outcome.
tags: ["kurtosis", "ethereum", "ethpandaops", "reproduce", "reproduction", "assertoor"]
inputs:
  values:
    enclave_name:
      required: true
      description: Kurtosis enclave name to create for reproduction. Reused across attempts (each attempt's launch step starts with `kurtosis enclave rm -f` so the relaunch is clean). Caller is responsible for final cleanup.
      schema: { type: string }
    kurtosis_params_path:
      required: true
      description: Absolute path on the worker to the saved kurtosis-params.yaml from the failing run's enclave dump.
      schema: { type: string }
    assertoor_test_name:
      description: Name of the assertoor test that originally failed. When non-empty, reproduction tracks only this test; otherwise the first failing test or all-success terminates the watcher.
      schema: { type: string, default: "" }
    package_ref:
      description: Kurtosis package reference to run
      schema: { type: string, default: "github.com/ethpandaops/ethereum-package" }
    run_started_at:
      description: Original CI run start timestamp. Fallback timestamp for best-effort pinning a floating GitHub Kurtosis package ref when package_runtime_identity lacks a package execution timestamp.
      schema: { type: string, default: "" }
    package_runtime_identity:
      description: Best-effort Kurtosis package identity parsed from the original CI artifacts. Prefer its package_started_at/source_revision over run_started_at when pinning package_ref for replay.
      schema:
        type: object
        default: {}
        properties:
          package_ref:
            type: string
          package_started_at:
            type: string
          source_repo:
            type: string
          source_revision:
            type: string
          source:
            type: string
          evidence:
            type: string
    runtime_components:
      description: Runtime image identities parsed from the original CI enclave dump. Used to pin every config-addressable replay image to original manifest digests when possible.
      schema:
        type: array
        default: []
        items:
          type: object
          properties:
            service_name:
              type: string
            role:
              type: string
            client:
              type: string
            image_ref:
              type: string
            image_id:
              type: string
            manifest_digest:
              type: string
            source_repo:
              type: string
            source_revision:
              type: string
            version:
              type: string
            build_info:
              type: string
            source:
              type: string
    pin_runtime_images:
      description: When true, rewrite all config-addressable image refs in the launch args to original CI manifest digest refs before replay.
      schema: { type: boolean, default: true }
    pin_package_to_run_time:
      description: When true, best-effort resolve floating GitHub package refs to the original package source revision or execution timestamp before launching Kurtosis, falling back to run_started_at.
      schema: { type: boolean, default: true }
    reproduction_attempt_timeout_minutes:
      description: Maximum time the watcher waits PER ATTEMPT for the failing test to complete before declaring not-reproduced. Total wall-clock budget is up to `reproduction_attempts x reproduction_attempt_timeout_minutes` in the worst case (all attempts time out). Default 6h per attempt x 4 attempts = 24h ceiling, but in practice the loop exits early on first reproduction or quick test completion.
      schema: { type: number, default: 360 }
    narrow_to_failing_test:
      description: When true (default) and `assertoor_test_name` is non-empty, patch the kurtosis args file before launch to remove every entry from `assertoor_params.tests` except the test of interest while preserving its stock YAML and timeout values. Set false to preserve the original CI test queue for faithful reproduction when queue/order/state coupling is suspected.
      schema: { type: boolean, default: true }
    reproduction_attempts:
      description: >-
        Maximum reproduction attempts. The loop stops early on the first `reproduced=true` or faithful full-queue `test_result=blocked` outcome. Narrowed-mode scope mismatches consume an attempt and may retry with a clean relaunch. Every attempt preserves the original assertoor timeout values and uses the selected test scope; retries are for non-deterministic / race-conditiony failures and transient observation failures, not timeout mutation. For a 50% per-attempt reproduction rate the cumulative odds at the default of 4 are ~94%; for 25% per-attempt, ~68%. Bump this for stubborn / rare non-deterministic bugs.
      schema: { type: number, default: 4 }
    prior_summary:
      description: CI-side prior AI summary describing the original failure mode. The watcher uses it to flag when a reproduction is the same vs. a different failure.
      schema: { type: string, default: "" }
  secrets:
    gh_token:
      required: false
      description: Optional GitHub token secret used only to resolve a floating GitHub package_ref to the commit visible at the original package execution time. When unset, use ambient gh authentication or unauthenticated public API access.
tasks:
  attempt_loop:
    inputs:
      values:
        enclave_name:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.enclave_name }}"
        kurtosis_params_path:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.kurtosis_params_path }}"
        package_ref:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?package_ref.orValue('github.com/ethpandaops/ethereum-package') }}"
        run_started_at:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?run_started_at.orValue('') }}"
        package_runtime_identity:
          required: true
          schema: { type: object }
          value: "${{ inputs.values.?package_runtime_identity.orValue({}) }}"
        runtime_components:
          required: true
          schema: { type: array, items: { type: object } }
          value: "${{ inputs.values.?runtime_components.orValue([]) }}"
        pin_runtime_images:
          required: true
          schema: { type: boolean }
          value: "${{ inputs.values.?pin_runtime_images.orValue(true) }}"
        pin_package_to_run_time:
          required: true
          schema: { type: boolean }
          value: "${{ inputs.values.?pin_package_to_run_time.orValue(true) }}"
        assertoor_test_name:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?assertoor_test_name.orValue('') }}"
        reproduction_attempt_timeout_minutes:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.?reproduction_attempt_timeout_minutes.orValue(360.0) }}"
        narrow_to_failing_test:
          required: true
          schema: { type: boolean }
          value: "${{ inputs.values.?narrow_to_failing_test.orValue(true) }}"
        prior_summary:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?prior_summary.orValue('') }}"
      secrets:
        gh_token:
          ref: inputs.secrets.gh_token
    loop:
      max: "${{ inputs.values.?reproduction_attempts.orValue(4.0) }}"
      until: "${{ outputs.values.reproduced == true || outputs.values.test_result == 'blocked' }}"
      onMaxExhausted: continue
    tasks:
      launch:
        quality-gate: "${{ has(outputs.values.launched) }}"
        instructions: |-
          Launch a Kurtosis Ethereum enclave from the saved args file so assertoor can run the failing test against a freshly-booted network. Run on a Kurtosis-capable worker with tool-use; reproduction attempts stay sticky to the same worker so the enclave and scratch files persist across attempts.

          Procedure:
          1. Best-effort remove any prior enclave with the same name: `kurtosis enclave rm -f <enclave_name>` (ignore errors when it does not exist). REQUIRED between reproduction attempts so each retry starts on a clean network.

          2. Prepare the launch args file for this attempt. Every attempt preserves the stock assertoor test YAML and original timeout values for every test it keeps.
             - When `narrow_to_failing_test == true` AND `assertoor_test_name` is non-empty: filter `assertoor_params.tests` to entries whose URL/path ends in `/<assertoor_test_name>.yaml` (case-insensitive). Use `yq` (preferred) or `python3` with PyYAML — never hand-rolled sed/awk. Record that replay scope is narrowed/targeted, but do not call that non-faithful by itself; it is the normal target-level reproduction mode.
             - When `narrow_to_failing_test == false`: use the original args file as-is (full CI queue). This is the mode to choose when queue/order/state coupling is suspected.
             - If `pin_runtime_images == true`, pin every config-addressable image ref in the chosen args to original CI runtime digests before writing the attempt file:
               - Required config-addressable fields are every `participants[].el_image`, every `participants[].cl_image`, every `participants[].vc_image`, and `assertoor_params.image` when present. Treat `assertoor_params.image` as material; do not leave `assertoor:master` unpinned when the original assertoor service spec has a manifest digest.
               - Build a digest map from `runtime_components[]` entries with a non-empty `manifest_digest`.
               - Also scan the original enclave dump on disk, rooted at the directory containing `kurtosis_params_path`, for every service `spec.json`. Use this scan to add or repair digest-map entries when `runtime_components` is incomplete or has blank digests. Recover at least `.Config.Image`, `.Image`, `.ImageManifestDescriptor.digest` or `.ImageManifestDescriptor.Digest`, service directory/name, and labels. Never report that a configured image had no manifest digest until this local artifact scan has been attempted.
               - Normalize matches by stripping docker-cache prefixes such as `docker.ethquokkaops.io/dh/`, `docker.ethquokkaops.io/gh/`, `docker.ethquokkaops.io/gcr/`, `/dh/`, `/gh/`, and `/gcr/`, and by comparing the remaining repo/name plus tag. For example, original runtime `docker.ethquokkaops.io/dh/ethpandaops/geth:master` matches configured `ethpandaops/geth:master`.
               - For participant images, match by both normalized image ref and service role/name when possible (`el-*` for `el_image`, `cl-*` for `cl_image`, `vc-*` for `vc_image`). For `assertoor_params.image`, prefer the original service whose service name/id is exactly `assertoor` and role/client is `assertoor`.
               - Pin all occurrences of a repeated configured image when the original artifacts prove the same manifest digest. For example, five `ethpandaops/geth:master` participant fields should all be rewritten when all matching EL services resolve to one digest.
               - If one configured image ref matches multiple distinct original manifest digests, do not choose one arbitrarily. Leave that field unchanged, record an `ambiguous image pin` entry in `unpinned_images`, and mark replay fidelity as degraded.
               - Replace the configured image with a digest ref that preserves the configured repo/registry but drops the tag, e.g. `ethpandaops/geth:master` -> `ethpandaops/geth@sha256:<original-manifest-digest>`. If the configured image already has `@sha256:` and it differs from the original runtime digest, prefer the original runtime digest and record the mismatch.
               - Do not guess pins for package-internal helper images that are not present in the args file. Keep `unpinned_images` focused on material config-addressable runtime images, missing artifact digests for those fields, and ambiguous configured pins; mention package-helper gaps in `runtime_fidelity_summary` only when they plausibly affect this test.
             - Write the result to `<kurtosis_params_path>.attempt-<iteration>.yaml`. This is the launch args file. Do not download, rewrite, inline, register, or schedule test YAML manually.

          3. Resolve the Kurtosis package ref for replay fidelity.
             - First derive the package pin source:
               - If `package_runtime_identity.source_revision` is a commit SHA for the same package source, prefer it directly.
               - Else use `package_runtime_identity.package_started_at` when present.
               - Else fall back to `run_started_at`.
             - If `pin_package_to_run_time == true`, a timestamp is available, and `package_ref` is a GitHub locator like `github.com/org/repo` without an explicit `@tag-or-sha`, resolve the latest commit at or before that timestamp:
               `gh api "repos/org/repo/commits?sha=main&until=<package-or-run-timestamp>&per_page=1" --jq '.[0].sha'`
               If `main` returns nothing, retry without `sha=main`.
             - Use the pinned locator `github.com/org/repo@<sha>` when resolution succeeds. If Kurtosis rejects that locator syntax, retry once with the original `package_ref` and mark package source as unpinned in `runtime_fidelity_summary`.
             - If `gh_token` is present, use it only as `GH_TOKEN` for the `gh api` command with `GH_PROMPT_DISABLED=1`. Do not print, echo, persist, or return the token. If `gh_token` is absent, use ambient `gh` auth or unauthenticated public API access.
             - If `package_ref` already contains `@` or is a local path, use it as provided and record that package pinning was already explicit or not applicable.

          4. Launch kurtosis: `kurtosis run --enclave <enclave_name> <package_ref_used> --args-file <chosen_args_file> --non-blocking-tasks --image-download missing`.

          5. After the run command returns, inspect: `kurtosis enclave inspect <enclave_name>`. Locate the `assertoor` service and record its exposed HTTP URL as `assertoor_url`. Record the full service list as `services`. When practical, verify launched container image IDs, labels, or run-log image lines against the digest pins for the material fields above. If a launched container does not match the intended original CI digest, record the mismatch in `unpinned_images` and `runtime_fidelity_summary`.

          6. Outcomes:
             - If `kurtosis run` failed before assertoor came up: set `launched=false`, include the last 30 lines of kurtosis output in `launch_summary`.
             - Otherwise: set `launched=true`. 2-3 sentence `launch_summary` covering startup duration, any warnings, whether the test list was narrowed or the full CI queue was preserved, and the replay fidelity state.
             - Always return `package_ref_used`, `pinned_images`, `unpinned_images`, and `runtime_fidelity_summary`.
               - `pinned_images`: short strings like `participants[4].vc_image ethpandaops/nimbus-validator-client:unstable -> ethpandaops/nimbus-validator-client@sha256:d9638e...` or `assertoor_params.image ethpandaops/assertoor:master -> ethpandaops/assertoor@sha256:742011...`.
               - `unpinned_images`: material config image fields that could not be pinned, plus ambiguous configured pins. Do not list unrelated package helper images unless evidence makes them material.
               - `runtime_fidelity_summary`: one paragraph stating whether replay used original CI image digests and a pinned package ref, or which exact gaps remain. Do not claim a clean pass refutes CI when images/package were not pinned.

          Do NOT remove the enclave at the end of this task.
        inputs:
          values:
            enclave_name:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.enclave_name }}"
            kurtosis_params_path:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.kurtosis_params_path }}"
            package_ref:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.package_ref }}"
            run_started_at:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.run_started_at }}"
            package_runtime_identity:
              required: true
              schema: { type: object }
              value: "${{ inputs.values.package_runtime_identity }}"
            runtime_components:
              required: true
              schema: { type: array, items: { type: object } }
              value: "${{ inputs.values.runtime_components }}"
            pin_runtime_images:
              required: true
              schema: { type: boolean }
              value: "${{ inputs.values.pin_runtime_images }}"
            pin_package_to_run_time:
              required: true
              schema: { type: boolean }
              value: "${{ inputs.values.pin_package_to_run_time }}"
            assertoor_test_name:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.assertoor_test_name }}"
            narrow_to_failing_test:
              required: true
              schema: { type: boolean }
              value: "${{ inputs.values.narrow_to_failing_test }}"
            iteration:
              required: true
              schema: { type: number }
              value: "${{ loop.attempts_made.orValue(0.0) + 1.0 }}"
          secrets:
            gh_token:
              ref: inputs.secrets.gh_token
        outputs:
          values:
            launched:
              required: true
              schema:
                type: boolean
                description: True when kurtosis run succeeded AND the assertoor service is reachable
            assertoor_url:
              required: true
              schema:
                type: string
                description: Assertoor API base URL (empty when launch failed)
            services:
              required: true
              schema:
                type: array
                items:
                  type: string
                description: Names of all services in the enclave
            launch_summary:
              required: true
              schema:
                type: string
                description: Concise launch result; includes failure tail when launched=false
            runtime_fidelity_summary:
              required: true
              schema:
                type: string
                description: Concise replay fidelity summary covering image digest pins, package ref pinning, and remaining gaps
            package_ref_used:
              required: true
              schema:
                type: string
                description: Package ref actually used for `kurtosis run`
            pinned_images:
              required: true
              schema:
                type: array
                items:
                  type: string
                description: Config image fields rewritten to original CI manifest digest refs
            unpinned_images:
              required: true
              schema:
                type: array
                items:
                  type: string
                description: Material configured runtime images or ambiguous configured pins that could not be pinned for replay
      await_assertoor:
        needs: [launch]
        if: "${{ tasks.launch.outputs.values.launched == true }}"
        quality-gate: "${{ has(outputs.values.reproduced) && has(outputs.values.test_result) }}"
        instructions: |-
          Watch the assertoor API until the target test reaches a terminal result, the faithful full queue is blocked before the target, narrowed mode proves it watched the wrong scope, or `reproduction_attempt_timeout_minutes` expires. Run on the same Kurtosis-capable worker with tool-use that launched the enclave.

          Use the durable poller pattern because one tool call may be shorter than the assertoor timeout:
          - Start one detached local poller per assertoor port. Reuse an existing live poller for the same port; do not start duplicates.
          - The poller writes a status log and, only on terminal target completion, a final JSON file.
          - Foreground calls should only tail/wait on the log in about 9-minute chunks, printing latest `DISCOVERY` or `STATUS` lines for audit visibility.
          - Do not emit structured output until the log contains exactly one terminal signal line: `TERMINAL`, `BLOCKED`, `SCOPE_MISMATCH`, or `TIMEOUT_REACHED`.

          Scope rules:
          - `scope="narrowed"` when `narrow_to_failing_test == true` and `assertoor_test_name` is non-empty; otherwise `scope="full-queue"`.
          - Discover target runs from `<assertoor_url>/api/v1/test_runs`; per-run detail is `<assertoor_url>/api/v1/test_run/<run_id>`.
          - Match `assertoor_test_name` against `test_id` or `name`, case-insensitive, also accepting paths that end with `/<test>.yaml`.
          - In full-queue mode, an earlier terminal failure before the target starts is `BLOCKED`.
          - In narrowed mode, never emit `blocked`. If another run fails first, or the selected target never appears before timeout, emit `SCOPE_MISMATCH`.
          - If no target name is available, watch all runs and treat the first terminal failure as the reproduction signal.

          Poller contract:
          - Log `DISCOVERY elapsed=<s> scope=<scope> target_run_id=<id-or-> target_test=<name> visible_runs=<compact-json>` while locating the run.
          - Log `STATUS elapsed=<s> scope=<scope> target_run_id=<id> target_test=<name> status=<status> result=<result> tasks=<done>/<total> running=[...] prior_running=[...] prior_failed=[...]` during polling.
          - On terminal target completion, write the final API response to `await-final-<port>.json`, then log `TERMINAL ... status=<status> result=<result>`.
          - On full-queue prior failure, log `BLOCKED ... blocker=[...]` and write the blocker text to `await-blocked-<port>.txt`.
          - On narrowed mismatch, log `SCOPE_MISMATCH ...` and write visible/prior failure context to `await-scope-mismatch-<port>.txt`.
          - On timeout, log `TIMEOUT_REACHED ...` with the last known target status and visible prior tests when available.

          Output mapping:
          - `TERMINAL` with failure/failed/error result or status -> `reproduced=true`, `test_result="failure"`. Extract failed task names/titles/statuses and short `result_error` excerpts from the saved final JSON into `evidence`.
          - `TERMINAL` with success/complete/completed and no failure evidence -> `reproduced=false`, `test_result="success"`.
          - `TIMEOUT_REACHED` -> `reproduced=false`, `test_result="timeout"`, summarizing elapsed time, scope, target, last status/result, running tasks, and prior tests.
          - `BLOCKED` -> `reproduced=false`, `test_result="blocked"`, explaining that faithful full-queue replay did not reach the target.
          - `SCOPE_MISMATCH` -> `reproduced=false`, `test_result="scope-mismatch"`, explaining why narrowed replay did not faithfully watch the selected target.

          Guardrails:
          - Do not inspect the final JSON until `TERMINAL` appears; it does not exist before then.
          - If a wait chunk has no terminal signal, run another wait chunk immediately. Do not summarize or emit output yet.
          - When `reproduced=true` and `prior_summary` is non-empty, state whether the observed failure matches the prior summary or appears to be a different mode.
          - Before emitting output, stop any remaining poller for this port and remove `await-<port>.log`, `await-final-<port>.json`, `await-blocked-<port>.txt`, `await-scope-mismatch-<port>.txt`, and `await-<port>.pid`.
          - Keep `reproduction_summary` to 4-6 sentences. Do not remove the enclave at the end of this task.
        inputs:
          values:
            assertoor_url:
              required: true
              schema: { type: string }
              value: "${{ tasks.launch.outputs.values.assertoor_url }}"
            assertoor_test_name:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.assertoor_test_name }}"
            narrow_to_failing_test:
              required: true
              schema: { type: boolean }
              value: "${{ inputs.values.narrow_to_failing_test }}"
            reproduction_attempt_timeout_minutes:
              required: true
              schema: { type: number }
              value: "${{ inputs.values.reproduction_attempt_timeout_minutes }}"
            prior_summary:
              required: true
              schema: { type: string }
              value: "${{ inputs.values.prior_summary }}"
        outputs:
          values:
            reproduced:
              required: true
              schema: { type: boolean }
            test_result:
              required: true
              schema:
                type: string
                enum: [failure, success, timeout, blocked, scope-mismatch]
            reproduction_summary:
              required: true
              schema: { type: string }
            evidence:
              required: true
              schema:
                type: array
                items:
                  type: string
            matches_prior:
              required: true
              schema:
                type: boolean
                description: True when the reproduction's failure mode appears to match the prior_summary (only meaningful when reproduced=true and prior_summary was provided)
    outputs:
      values:
        launched:
          required: true
          schema: { type: boolean }
          value: "${{ tasks.launch.outputs.values.launched }}"
        assertoor_url:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.launch.outputs.values.assertoor_url) ? tasks.launch.outputs.values.assertoor_url : '' }}"
        services:
          required: true
          schema: { type: array, items: { type: string } }
          value: "${{ has(tasks.launch.outputs.values.services) ? tasks.launch.outputs.values.services : [] }}"
        launch_summary:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.launch.outputs.values.launch_summary) ? tasks.launch.outputs.values.launch_summary : '' }}"
        runtime_fidelity_summary:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.launch.outputs.values.runtime_fidelity_summary) ? tasks.launch.outputs.values.runtime_fidelity_summary : '' }}"
        package_ref_used:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.launch.outputs.values.package_ref_used) ? tasks.launch.outputs.values.package_ref_used : inputs.values.package_ref }}"
        pinned_images:
          required: true
          schema: { type: array, items: { type: string } }
          value: "${{ has(tasks.launch.outputs.values.pinned_images) ? tasks.launch.outputs.values.pinned_images : [] }}"
        unpinned_images:
          required: true
          schema: { type: array, items: { type: string } }
          value: "${{ has(tasks.launch.outputs.values.unpinned_images) ? tasks.launch.outputs.values.unpinned_images : [] }}"
        reproduced:
          required: true
          schema: { type: boolean }
          value: "${{ has(tasks.await_assertoor.outputs.values.reproduced) ? tasks.await_assertoor.outputs.values.reproduced : false }}"
        test_result:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.await_assertoor.outputs.values.test_result) ? tasks.await_assertoor.outputs.values.test_result : 'launch-failed' }}"
        reproduction_summary:
          required: true
          schema: { type: string }
          value: "${{ has(tasks.await_assertoor.outputs.values.reproduction_summary) ? tasks.await_assertoor.outputs.values.reproduction_summary : '' }}"
        evidence:
          required: true
          schema: { type: array, items: { type: string } }
          value: "${{ has(tasks.await_assertoor.outputs.values.evidence) ? tasks.await_assertoor.outputs.values.evidence : [] }}"
        matches_prior:
          required: true
          schema: { type: boolean }
          value: "${{ has(tasks.await_assertoor.outputs.values.matches_prior) ? tasks.await_assertoor.outputs.values.matches_prior : false }}"
        attempts_made:
          required: true
          schema: { type: number }
          value: "${{ loop.attempts_made.orValue(0.0) + 1.0 }}"
        attempts_converged:
          required: true
          schema: { type: boolean }
          value: "${{ (has(tasks.await_assertoor.outputs.values.reproduced) ? tasks.await_assertoor.outputs.values.reproduced : false) == true || (has(tasks.await_assertoor.outputs.values.test_result) ? tasks.await_assertoor.outputs.values.test_result : 'launch-failed') == 'blocked' }}"
outputs:
  values:
    launched:
      required: true
      schema: { type: boolean }
      value: "${{ tasks.attempt_loop.outputs.values.launched }}"
    enclave_name:
      required: true
      schema: { type: string }
      value: "${{ inputs.values.enclave_name }}"
    assertoor_url:
      required: true
      schema: { type: string }
      value: "${{ tasks.attempt_loop.outputs.values.assertoor_url }}"
    services:
      required: true
      schema: { type: array, items: { type: string } }
