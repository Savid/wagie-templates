kind: Template
schemaVersion: wagie/v1
id: dev.wagie/code-evidence-locate
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when log/error evidence needs to be mapped to candidate source files in an already-cloned repository. Distils canonical search tokens from the evidence, runs grep/rg across the repo, and returns ranked candidate paths with short relevance notes. Pure search + read — does not modify the workdir. Language-agnostic.
tags: ["code", "search", "evidence", "investigation", "locate"]
inputs:
  values:
    workdir:
      required: true
      description: Absolute path to the cloned repo root. The task `cd`s here and runs grep/rg against it.
      schema: { type: string }
    evidence_excerpts:
      required: true
      description: Log excerpts, error strings, stack traces — anything that might appear as a literal substring in the source. Used to derive search tokens.
      schema:
        type: array
        items:
          type: string
    focus_hint:
      description: Optional natural-language hint about what to look for (e.g. "transaction submission retry logic"). Helps the LLM bias token selection.
      schema: { type: string, default: "" }
    max_candidates:
      description: Upper bound on returned candidate count.
      schema: { type: number, default: 10 }
    include_globs:
      description: Optional path globs to scope the search (e.g. `["src/**", "internal/**"]`). Empty searches everything.
      schema:
        type: array
        default: []
        items:
          type: string
    exclude_globs:
      description: Path globs to exclude from search.
      schema:
        type: array
        default: ["vendor/**", "node_modules/**", "**/*.lock", "**/*_generated.go", "**/*_gen.go", "**/*.pb.go"]
        items:
          type: string
tasks:
  locate:
    quality-gate: "${{ has(outputs.values.candidates) }}"
    instructions: |-
      Map evidence excerpts to candidate source files inside the provided repo workdir. You need a worker with tool-use (shell access to run grep/rg).

      Procedure:
      1. `cd` into the workdir. Use `rg` (ripgrep) when available, else `grep -r`.
      2. From each evidence excerpt, extract canonical search tokens:
         - Identifier-shaped substrings (camelCase / snake_case words, function-like patterns).
         - Distinctive error string fragments (5-20 chars; strip per-run noise like uuids, hex, timestamps before searching).
         - Type / module names mentioned.
         - Avoid tokens shorter than 4 chars or matching trivial English words.
         When `focus_hint` is non-empty, derive 2-4 additional tokens from it.
      3. Run searches scoped by `include_globs` and excluding `exclude_globs`. Aggregate hits by file path.
      4. Rank candidate files by:
         - Token count distinct hits (more distinct tokens hit → higher rank).
         - Total hit count (tie-breaker).
         - Penalise test files and fixture data unless the evidence specifically points at tests.
      5. For each of the top `max_candidates` files, briefly read the surrounding context (20-50 lines around hits) and record one short snippet and a one-sentence note on why the file is a candidate.
      6. Cap result count at `max_candidates`. Always return at least one candidate when matches exist; return an empty array when nothing matched.

      Be conservative — `relevance` 70+ requires multiple distinct tokens hitting; 90+ requires multi-token hits AND code that plausibly handles the evidence's domain. Do not invent matches.
    inputs:
      values:
        workdir:
          schema: { type: string }
          value: "${{ inputs.values.workdir }}"
        evidence_excerpts:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.evidence_excerpts }}"
        focus_hint:
          schema: { type: string }
          value: "${{ inputs.values.?focus_hint.orValue('') }}"
        max_candidates:
          schema: { type: number }
          value: "${{ inputs.values.?max_candidates.orValue(10) }}"
        include_globs:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?include_globs.orValue([]) }}"
        exclude_globs:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?exclude_globs.orValue(['vendor/**', 'node_modules/**', '**/*.lock', '**/*_generated.go', '**/*_gen.go', '**/*.pb.go']) }}"
    outputs:
      values:
        candidates:
          required: true
          schema:
            type: array
            description: Ranked candidate files by descending relevance
            items:
              type: object
              properties:
                path:
                  type: string
                  description: Path relative to workdir
                relevance:
                  type: number
                  description: 0-100 confidence the file is involved in the evidence
                hit_count:
                  type: number
                  description: Total token hits in this file
                distinct_tokens_hit:
                  type: number
                  description: Number of distinct search tokens this file matched
                snippet:
                  type: string
                  description: Short code excerpt showing one matching region
                note:
                  type: string
                  description: One-sentence rationale for ranking
              required: [path, relevance, snippet, note]
        search_summary:
          required: true
          schema: { type: string, description: Short summary of search tokens, scope, and outcome }
        tokens_used:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Search tokens actually used (for auditability)
outputs:
  values:
    candidates:
      required: true
      schema: { type: array, items: { type: object } }
      value: "${{ tasks.locate.outputs.values.candidates }}"
    search_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.locate.outputs.values.search_summary }}"
    tokens_used:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.locate.outputs.values.tokens_used }}"
