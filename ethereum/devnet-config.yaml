kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-config
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when you have an ethpandaops devnet name and want one ready-to-run Kurtosis ethereum-package args-file that reproduces it locally. Discovers the live devnet profile through the panda CLI (not static notes), honors optional steering, and dry-run-validates the result when kurtosis is available.
tags: ["kurtosis", "ethereum", "ethpandaops", "ethereum-package", "devnet", "config", "args-file", "panda"]
examples:
  - "make a Kurtosis args file for devnet X"
  - "derive ethereum-package settings from live panda inventory"
  - "flag inventory versus CL config mismatches"
  - "dry-run validate the generated args YAML"
  - "honor selected clients in the args file"
inputs:
  values:
    devnet:
      required: true
      description: Devnet or devnet-group name to model, e.g. glamsterdam-devnet-6
      schema: { type: string }
    steering:
      description: Optional free-form preferences, e.g. "only lighthouse + geth", "minimal 2-node", "include buildoor", "pull gloas forward"
      schema: { type: string }
    package_ref:
      description: Optional override for the Kurtosis package reference. When unset, the runbook's default (ethereum-package) applies.
      schema: { type: string }
tasks:
  assemble_config:
    quality-gate: "${{ has(outputs.values.summary) && size(outputs.values.summary) > 0 && (!outputs.values.dry_run.attempted || outputs.values.dry_run.?passed.orValue(false)) }}"
    instructions: |-
      Produce ONE runnable ethereum-package Kurtosis args-file that models the
      named devnet, and write it as the `config` artifact.

      Ground the devnet with the runbook found via
      `panda search runbooks "hosted devnet context intake"`, then synthesize
      the args-file per the runbook found via
      `panda search runbooks "build a kurtosis config from a public devnet"` —
      it owns source authority, `steering`, fidelity, dry-run validation, and
      the trigger list for launch requirements. Honor a `package_ref` override
      when supplied.

      Emit the config artifact, a short summary of the key choices, the
      assumptions or unresolved gaps, every steering deviation from the hosted
      network, the flags the launch must pass, and the dry-run status —
      explicit even when kurtosis was unavailable. A config whose dry-run
      failed is not a valid result: fix the args-file and re-validate instead
      of returning it.
    inputs:
      values:
        devnet:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
        steering:
          schema: { type: string }
          value: "${{ inputs.values.?steering.orValue('') }}"
        package_ref:
          schema: { type: string }
          value: "${{ inputs.values.?package_ref.orValue('') }}"
    outputs:
      values:
        summary:
          required: true
          schema: { type: string, description: "Short summary of topology, forks, tooling, and key choices" }
        assumptions:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Assumptions or unresolved gaps, including any source inconsistencies found
        deviations:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Every steering-driven deviation from the hosted network, empty when unsteered
        launch_requirements:
          required: true
          schema:
            type: array
            items: { type: string }
            description: "Flags the launch must pass (e.g. --privileged for privileged services), empty when none — trigger list owned by the config-synthesis runbook"
        dry_run:
          required: true
          schema:
            type: object
            description: "Dry-run validation status, explicit even when not attempted — shape owned by the config-synthesis runbook"
            properties:
              attempted: { type: boolean }
              command: { type: string }
              passed: { type: boolean }
            required: [attempted]
      artifacts:
        config:
          required: true
          contentType: text/yaml
          description: Single runnable ethereum-package args-file for the devnet
outputs:
  values:
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.assemble_config.outputs.values.summary }}"
    assumptions:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.assemble_config.outputs.values.assumptions }}"
    deviations:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.assemble_config.outputs.values.deviations }}"
    launch_requirements:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.assemble_config.outputs.values.launch_requirements }}"
    dry_run:
      required: true
      schema:
        type: object
        properties:
          attempted: { type: boolean }
          command: { type: string }
          passed: { type: boolean }
        required: [attempted]
      value: "${{ tasks.assemble_config.outputs.values.dry_run }}"
  artifacts:
    config:
      ref: tasks.assemble_config.outputs.artifacts.config
