kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-finality-assessment
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a workflow needs a structured Ethereum devnet finality assessment; gathers finality observations and classifies the current finality state.
tags: ["devnet", "ethereum", "ethpandaops", "finality"]
inputs:
  values:
    network_name:
      required: true
      description: Resolved target devnet name
      schema: { type: string }
    investigation_timeframe:
      required: true
      description: Active investigation timeframe
      schema: { type: string }
    threshold_epochs:
      description: Epochs behind finality after which the situation is degraded
      schema: { type: number, default: 4 }
    instances:
      description: Specific instances to inspect first
      schema:
        type: array
        items: { type: string }
        default: []
    data_profile:
      required: true
      description: Available debugging surfaces and recommended mode
      schema:
        type: object
        properties:
          mode:
            type: string
            enum: [local, remote]
          has_dora:
            type: boolean
          has_loki:
            type: boolean
          loki_datasource:
            type: string
          has_ethnode:
            type: boolean
          has_clickhouse:
            type: boolean
          has_prometheus:
            type: boolean
          has_direct_node_access:
            type: boolean
          loki_schema:
            type: string
            enum: [ethpandaops, kurtosis]
        required: [mode, has_dora, has_loki, loki_datasource, has_ethnode, has_direct_node_access, loki_schema]
    context_summary:
      description: Optional normalized context summary (fork schedule, deployment mode, available surfaces)
      schema: { type: string }
    notes_summary:
      description: Optional high-signal notes summary for the devnet
      schema: { type: string }
    notes_highlights:
      description: Optional structured notes highlights worth preserving in the assessment
      schema:
        type: array
        items: { type: string }
        default: []
tasks:
  observe:
    quality-gate: "${{ has(outputs.values.finality_summary) && size(outputs.values.finality_summary) > 0 }}"
    instructions: |-
      Assess the network's finality state. This is a focused finality drill-down — broad
      baseline work (fork detection, missing proposers, offline attesters, general node health)
      is handled by the baseline template. Focus on where finality is, why it stopped, and
      whether it's recovering. A worker with reasoning and tool-use is required.

      Use the `panda` CLI. For Python API calls, use heredoc stdin to avoid quote issues:
      ```
      panda execute <<'PYEOF'
      <python code here — no escaping needed>
      PYEOF
      ```

      ## Finality checkpoint collection

      The Dora overview only returns a `finalized` boolean, not the epoch number. Use ethnode
      for the authoritative finalized epoch:
      - `panda ethnode finality <network> <instance>` — returns finalized epoch/root,
        current_justified epoch/root, previous_justified epoch/root.

      Query 2-3 nodes from different client types. If finalized epochs or roots disagree,
      the network has split and nodes are finalizing different chains.

      Compute: `epochs_behind = current_epoch - finalized_epoch`

      ## Participation trend (epoch walk)

      Walk recent epochs to find the drop-off point and assess direction:
      ```
      panda execute <<'PYEOF'
      from ethpandaops import dora
      network = "<network>"
      overview = dora.get_network_overview(network)
      head_epoch = overview["current_epoch"]
      for e in range(head_epoch - 1, max(head_epoch - 20, 0), -1):
          ep = dora.get_epoch(network, e)
          d = ep["data"]
          print(f"  epoch={d['epoch']} finalized={d['finalized']} participation={d['globalparticipationrate']}% proposed={d['blockscount']}/{d['blockscount']+d['missedblocks']}")
      PYEOF
      ```

      From this, identify:
      - `finality_broke_epoch`: first epoch after the last finalized one.
      - `participation_trend`: recovering (increasing), stable, or declining.

      The head epoch is in progress — start analysis from head_epoch - 1.

      ## Finality thresholds

      - Finality requires >66.7% (2/3) of stake attesting.
      - Normal lag: 2 epochs. Concern: >4. Critical: >8.

      <example>
      Good finality summary:
      "Finality stalled at epoch 3742. Last finalized epoch: 3741 (82% participation).
      Epoch 3742 dropped to 31% and has not recovered — current epoch 3912 is 170 epochs
      behind. Participation stable at 30% across last 20 epochs (no recovery trend).
      lighthouse-geth-1 and lodestar-geth-1 disagree on finalized checkpoint (3741 vs 3740),
      suggesting a split occurred near the finality boundary."
      </example>

      ## Report artifact

      Build a markdown report as you go. Append raw API responses after each collection
      step. Write the final report as the `report` output artifact.

      ## Evidence and uncertainty

      Ground every observation in a specific tool output. If a data source is unavailable or
      a query fails, say so rather than inferring. If evidence is ambiguous, express that —
      a qualified assessment is more useful than a confident wrong one.
    inputs:
      values:
        network_name:
          schema: { type: string }
          value: "${{ inputs.values.network_name }}"
        investigation_timeframe:
          schema: { type: string }
          value: "${{ inputs.values.investigation_timeframe }}"
        threshold_epochs:
          schema: { type: number }
          value: "${{ inputs.values.?threshold_epochs.orValue(4) }}"
        instances:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?instances.orValue([]) }}"
        data_profile:
          schema: { type: object }
          value: "${{ inputs.values.data_profile }}"
        context_summary:
          schema: { type: string }
          value: "${{ inputs.values.?context_summary.orValue('') }}"
        notes_summary:
          schema: { type: string }
          value: "${{ inputs.values.?notes_summary.orValue('') }}"
        notes_highlights:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?notes_highlights.orValue([]) }}"
    outputs:
      values:
        finality_summary:
          required: true
          schema:
            type: string
            description: Concise finality assessment summary
        epochs_behind:
          required: true
          schema:
            type: number
            description: Epochs behind finality (current_epoch - finalized_epoch)
        finality_broke_epoch:
          required: true
          schema:
            type: number
            description: The epoch where finality stopped progressing (-1 if unknown)
        participation_trend:
          required: true
          schema:
            type: string
            enum: [recovering, stable, declining, unknown]
            description: Direction of participation rate across recent epochs
        evidence:
          required: true
          schema:
            type: array
            items:
              type: string
            description: Observations supporting the finality assessment
        finality_checkpoints:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                instance_name:
                  type: string
                finalized_epoch:
                  type: number
                finalized_root:
                  type: string
                justified_epoch:
                  type: number
                justified_root:
                  type: string
              required: [instance_name, finalized_epoch, justified_epoch]
            description: Per-node finality checkpoint data showing agreement or divergence
        participation_by_epoch:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                epoch:
                  type: number
                finalized:
                  type: boolean
                participation_rate:
                  type: number
                proposed_blocks:
                  type: number
                missed_blocks:
                  type: number
              required: [epoch, participation_rate]
            description: Epoch-by-epoch participation and finality status
      artifacts:
        report:
          required: true
          contentType: text/markdown
          description: Finality report with raw API responses
  classify_status:
    needs: [observe]
    uses: dev.wagie/decide@1.0.0
    inputs:
      values:
        question:
          value: "${{ 'Based on the finality observations, what is the current finality state?' }}"
        options:
          value: "${{ ['healthy', 'delayed', 'stalled', 'split-driven', 'unknown'] }}"
        context:
          value: |-
            ${{
              "Finality summary: " + tasks.observe.outputs.values.finality_summary + "\n" +
              "Epochs behind: " + string(tasks.observe.outputs.values.epochs_behind) + "\n" +
              "Finality broke at epoch: " + string(tasks.observe.outputs.values.finality_broke_epoch) + "\n" +
              "Participation trend: " + tasks.observe.outputs.values.participation_trend + "\n" +
              "Evidence count: " + string(size(tasks.observe.outputs.values.evidence)) + "\n" +
              "Finality checkpoints count: " + string(size(tasks.observe.outputs.values.finality_checkpoints)) + "\n" +
              "Participation-by-epoch entries: " + string(size(tasks.observe.outputs.values.participation_by_epoch)) + "\n\n" +
              "Finality state diagnostic signatures:\n" +
              "- healthy: Finality progressing normally, <=2 epochs behind, participation >66.7%.\n" +
              "- delayed: 3-8 epochs behind finality, participation hovering near 66.7%, possible recovery. Participation trend is recovering or stable.\n" +
              "- stalled: >8 epochs behind, participation well below 66.7%, no recovery trend. Participation trend is stable or declining.\n" +
              "- split-driven: Finality delay caused by a network split — /forks shows multiple forks with different head_roots; nodes disagree on finalized checkpoints; validators attesting on different forks dilute effective participation below threshold.\n" +
              "- unknown: Evidence insufficient to classify finality state."
            }}
outputs:
  values:
    finality_status:
      required: true
      schema: { type: string }
      value: "${{ tasks.classify_status.outputs.values.decision }}"
    finality_status_confidence:
      required: true
      schema: { type: number }
      value: "${{ tasks.classify_status.outputs.values.confidence }}"
    finality_status_reasoning:
      required: true
      schema: { type: string }
      value: "${{ tasks.classify_status.outputs.values.reasoning }}"
    finality_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.observe.outputs.values.finality_summary }}"
    epochs_behind:
      required: true
      schema: { type: number }
      value: "${{ tasks.observe.outputs.values.epochs_behind }}"
    finality_broke_epoch:
      required: true
      schema: { type: number }
      value: "${{ tasks.observe.outputs.values.finality_broke_epoch }}"
    participation_trend:
      required: true
      schema: { type: string }
      value: "${{ tasks.observe.outputs.values.participation_trend }}"
    evidence:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.observe.outputs.values.evidence }}"
    finality_checkpoints:
      required: true
      schema: { type: array, items: { type: object } }
      value: "${{ tasks.observe.outputs.values.finality_checkpoints }}"
    participation_by_epoch:
      required: true
      schema: { type: array, items: { type: object } }
      value: "${{ tasks.observe.outputs.values.participation_by_epoch }}"
  artifacts:
    report:
      ref: tasks.observe.outputs.artifacts.report
