kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-pipeline-from-config
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when you already have a runnable Kurtosis ethereum-package args-file and want the remote reproduce-and-analyze pipeline run on it end to end: launch and snapshot it on panda-compute at chosen epochs, watch a restored snapshot forward for a window, then root-cause every issue it surfaces. The watch restores the earliest epoch snapshot by default — an observed replay of the whole captured window; set watch_from_epoch to a later captured epoch to skip the replay and watch only fresh epochs beyond it. Each investigation restores its own sandbox from the broken-state snapshot and receives the epoch-snapshot catalog to pick an earlier restore point; duplicate-fingerprint issues are surfaced but not re-investigated. Config-first entry point; devnet-pipeline wraps this when only a hosted devnet name exists.
tags: ["ethereum", "devnet", "kurtosis", "pipeline", "config", "args-file", "snapshot", "watch", "investigate", "panda-compute"]
examples:
  - "run the devnet pipeline on this kurtosis config"
  - "launch my args file on panda-compute and hunt bugs"
  - "snapshot my config at chosen epochs then investigate issues"
  - "from args-file to per-issue root-cause reports"
  - "fan out investigations over every issue using the snapshots"
inputs:
  values:
    devnet:
      required: true
      description: Devnet name or label this config represents, used for snapshot notes and issue dedupe context
      schema: { type: string }
    package_ref:
      description: Optional override for the Kurtosis package reference, threaded to the compute launch
      schema: { type: string }
    snapshot_epochs:
      description: Epochs to snapshot the launched network at
      schema: { type: array, items: { type: number }, default: [0] }
    watch_from_epoch:
      description: Captured epoch whose snapshot the watch restores and runs forward from; must be one of snapshot_epochs. Unset or negative means the earliest captured epoch (an observed replay of the whole window)
      schema: { type: number }
    watch_epochs:
      description: How many epochs to watch the restored snapshot (default 5)
      schema: { type: number, default: 5 }
    sandbox_ttl:
      description: Optional sandbox TTL (e.g. 2h) to bound each VM's lifetime
      schema: { type: string }
    launch_requirements:
      description: "Flags the config requires the launch to pass (e.g. --privileged), as emitted by config synthesis; threaded to the compute launch"
      schema: { type: array, items: { type: string } }
  artifacts:
    config:
      required: true
      contentType: text/yaml
      description: Kurtosis ethereum-package args-file to launch on the sandbox
tasks:
  snapshot:
    uses: dev.wagie/devnet-snapshot@1.0.0
    inputs:
      values:
        devnet:
          value: "${{ inputs.values.devnet }}"
        package_ref:
          value: "${{ inputs.values.?package_ref.orValue('') }}"
        snapshot_epochs:
          value: "${{ inputs.values.?snapshot_epochs.orValue([0]) }}"
        sandbox_ttl:
          value: "${{ inputs.values.?sandbox_ttl.orValue('') }}"
        launch_requirements:
          value: "${{ inputs.values.?launch_requirements.orValue([]) }}"
      artifacts:
        config:
          ref: inputs.artifacts.config
  watch:
    needs: [snapshot]
    uses: dev.wagie/devnet-watch@1.0.0
    inputs:
      values:
        devnet:
          value: "${{ inputs.values.devnet }}"
        snapshot_id:
          # the watch restores the watch_from_epoch snapshot when set, else the
          # earliest captured snapshot, and runs forward. A watch_from_epoch that
          # matches no captured epoch fails this binding (index on an empty
          # filter) instead of degrading into an empty snapshot_id downstream.
          value: "${{ inputs.values.?watch_from_epoch.orValue(-1.0) < 0.0 ? tasks.snapshot.outputs.values.snapshots[0].snapshot_id : tasks.snapshot.outputs.values.snapshots.filter(s, s.epoch == inputs.values.watch_from_epoch)[0].snapshot_id }}"
        watch_epochs:
          value: "${{ inputs.values.?watch_epochs.orValue(5) }}"
        sandbox_ttl:
          value: "${{ inputs.values.?sandbox_ttl.orValue('') }}"
  investigate:
    # Deliberately passes NO network_target so investigations default to their
    # own restores from the broken-state snapshot. Isolation is best-effort:
    # issues carry the watch sandbox in handles.sandbox_id, and the root-cause
    # runbook's live-handle disqualifier may attach hunts to it (read-only,
    # under shared-sandbox etiquette) while its evidence is reachable.
    needs: [snapshot, watch]
    inputs:
      values:
        snapshot_id:
          required: true
          schema: { type: string, description: "Final broken-state snapshot from the watch, empty when none" }
          value: "${{ tasks.watch.outputs.values.final_snapshot.?snapshot_id.orValue('') }}"
        genesis_time:
          schema: { type: string, description: "Source network genesis time for the reproduction-fidelity check" }
          value: "${{ tasks.snapshot.outputs.values.?genesis_time.orValue('') }}"
        snapshots:
          required: true
          schema: &snapshot_catalog_schema
            type: array
            items:
              type: object
              properties:
                epoch: { type: number }
                snapshot_id: { type: string }
                captured_at: { type: string, description: "Capture time on the sandbox clock — carried on the epoch-0 base entry (a mid-epoch capture); the root-cause runbook reads it for pre-first_bad restores" }
              required: [epoch, snapshot_id]
          value: "${{ tasks.snapshot.outputs.values.snapshots }}"
    matrix:
      axes:
        issue:
          schema:
            type: array
            items: &issue_item_schema
              type: object
              properties:
                title: { type: string }
                summary: { type: string, description: "Free-text reasoning, written first" }
                classification:
                  type: object
                  properties:
                    category: { type: string, description: Failure mode — enum owned by the issue-contract runbook }
                    layer: { type: string, description: consensus | execution | network | tooling | cross-layer }
                    spread: { type: string, description: single-client | subset | all-clients | network-wide | unknown }
                first_bad:
                  type: object
                  description: Earliest artifact that explains later symptoms
                  properties:
                    kind: { type: string, description: slot | block | epoch | log | rpc | test | service-state }
                    value: { type: string }
                    at: { type: string }
                affected:
                  type: array
                  items:
                    type: object
                    properties:
                      node: { type: string }
                      role: { type: string }
                      client: { type: string }
                      image: { type: string }
                evidence:
                  type: array
                  items: &evidence_item_schema
                    type: object
                    properties:
                      source: { type: string, description: Tool or datasource that produced it }
                      ref: { type: string, description: Executable re-derivation — a reader can re-run it }
                      at: { type: string, description: "Slot, block, epoch, or timestamp anchoring it" }
                      detail: { type: string, description: "What was observed, verbatim values preserved" }
                    required: [source, ref, detail]
                co_present:
                  type: array
                  items: { type: string }
                  description: Co-present distractor signals, kept out of the root narrative
                fingerprint:
                  type: object
                  description: Identity block owned by the fingerprinting runbook — no run-specific ids in the key
                  properties:
                    rationale: { type: string }
                    key: { type: string }
                    decision: { type: string, description: new | duplicate | variant | insufficient-context }
                    matched: { type: string }
                    variant_dimension: { type: string }
                    confidence: { type: string }
                handles:
                  type: object
                  description: What lets an investigation restore or reach the broken state — fill only the id kinds that exist
                  properties:
                    snapshot_id: { type: string }
                    sandbox_id: { type: string }
                    enclave: { type: string }
                    network: { type: string, description: Source or hosted network id }
                    setup_summary:
                      type: object
                      description: Watch setup_summary copied whole — reproduction and reachability judge against it
                confidence: { type: string, description: Scale owned by the evidence-discipline runbook }
              required: [title, summary]
          # duplicates are surfaced in the issues output but not re-investigated
          # (fingerprint-before-expensive-work, per the root-cause runbook)
          value: "${{ tasks.watch.outputs.values.issues.filter(i, i.?fingerprint.?decision.orValue('') != 'duplicate') }}"
    tasks:
      one:
        uses: dev.wagie/devnet-issue-investigate@1.0.0
        inputs:
          values:
            issue:
              value: "${{ matrix.issue }}"
            snapshot_id:
              value: "${{ inputs.values.snapshot_id }}"
            snapshots:
              value: "${{ inputs.values.snapshots }}"
            genesis_time:
              value: "${{ inputs.values.?genesis_time.orValue('') }}"
    outputs:
      values:
        investigations:
          required: true
          schema:
            type: array
            items: &report_schema
              type: object
              properties:
                summary: { type: string, description: "Reasoning in prose, written first" }
                root_cause:
                  type: object
                  properties:
                    statement: { type: string }
                    family: { type: string }
                    confidence: { type: string, description: "high | medium | low, on the evidence-discipline scale" }
                  required: [statement, confidence]
                reproduction:
                  type: object
                  properties:
                    status: { type: string, description: reproduced | partial | not-reproduced | local-live | public-live | tooling-live | historical-only }
                    recipe: { type: array, items: { type: string } }
                  required: [status]
                timeline:
                  type: array
                  items:
                    type: object
                    properties:
                      ts: { type: string }
                      kind: { type: string, description: restart | block | timing | log | note }
                      text: { type: string }
                      log: { type: string }
                    required: [text]
                hypotheses:
                  type: object
                  properties:
                    supported: { type: array, items: { type: string } }
                    rejected: { type: array, items: { type: string } }
                    partial: { type: array, items: { type: string } }
                trace_verdict: { type: string, description: reachable | partially-reachable | not-reachable | insufficient-evidence }
                review_verdict: { type: string, description: survives | weakened | refuted }
                citations:
                  type: array
                  items: *evidence_item_schema
                feedback: { type: object, description: "Embedded follow-up queue, identical to the sibling feedback output — shape owned by the feedback-queue runbook" }
                next_action: { type: string, description: file client bug | spec issue | config fix | tooling fix | experiment triage | rerun with more evidence | no issue reproduced }
              required: [summary, root_cause, reproduction, trace_verdict, review_verdict, next_action]
          value: "${{ tasks.one.outputs.values.report }}"
        feedback:
          required: true
          schema: &feedback_matrix_schema
            type: array
            description: Follow-up queue per investigated issue, parallel to investigations — shape owned by the feedback-queue runbook
            items: &feedback_schema
              type: object
              properties:
                priority_summary: { type: string }
                terminal: { type: boolean }
                terminal_reason: { type: string }
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      kind: { type: string, description: watch | investigate | config | snapshot | source-trace | reachability-trace | experiment-triage | manual-review | publish | no-op }
                      reason: { type: string }
                      priority: { type: string, description: high | medium | low }
                      inputs: { type: object, description: Handles and query params only }
                      success_condition: { type: string }
                      stop_condition: { type: string }
                      runbook_refs: { type: array, items: { type: string } }
                      blocked_by: { type: string }
                    required: [kind, reason, success_condition, stop_condition]
              required: [tasks]
          value: "${{ tasks.one.outputs.values.feedback }}"
        investigated_issues:
          required: true
          schema:
            type: array
            description: The canonical issue record each investigation ran on, parallel to investigations — pairs reports back to issues across the duplicate filter
            items: *issue_item_schema
          value: "${{ tasks.one.outputs.values.canonical_issue }}"
outputs:
  values:
    base_snapshot_id:
      required: true
      schema: { type: string, description: "Snapshot of the freshly launched network, restorable into new sandboxes" }
      value: "${{ tasks.snapshot.outputs.values.base_snapshot_id }}"
    genesis_time:
      schema: { type: string, description: "Source network genesis time (sandbox clock) from the snapshot stage — thread into feedback-loop investigations for the reproduction-fidelity check" }
      value: "${{ tasks.snapshot.outputs.values.?genesis_time.orValue('') }}"
    snapshots:
      required: true
      schema: *snapshot_catalog_schema
      value: "${{ tasks.snapshot.outputs.values.snapshots }}"
    issues:
      required: true
      schema:
        type: array
        items: *issue_item_schema
      value: "${{ tasks.watch.outputs.values.issues }}"
    healthy_window_summary:
      required: true
      schema: { type: string, description: "One paragraph instead of issues when the watch window was healthy, else empty" }
      value: "${{ tasks.watch.outputs.values.healthy_window_summary }}"
    watch_notes:
      required: true
      schema: { type: string, description: "Reach/coverage caveats for the watch window, empty when none" }
      value: "${{ tasks.watch.outputs.values.notes }}"
    final_snapshot:
      required: true
      schema:
        type: object
        properties:
          snapshotted: { type: boolean }
          snapshot_id: { type: string }
        required: [snapshotted]
      value: "${{ tasks.watch.outputs.values.final_snapshot }}"
    watch_feedback:
      required: true
      schema: *feedback_schema
      value: "${{ tasks.watch.outputs.values.feedback }}"
    investigations:
      required: true
      schema:
        type: array
        items: *report_schema
      value: "${{ tasks.investigate.outputs.values.investigations }}"
    feedback:
      required: true
      schema: *feedback_matrix_schema
      value: "${{ tasks.investigate.outputs.values.feedback }}"
    investigated_issues:
      required: true
      schema:
        type: array
        description: The canonical issue record each investigation ran on, parallel to investigations
        items: *issue_item_schema
      value: "${{ tasks.investigate.outputs.values.investigated_issues }}"
