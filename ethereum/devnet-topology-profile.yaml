kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-topology-profile
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a config workflow needs a minimal participant topology derived from devnet notes and explicit hints; returns representative client pairs and config-relevant assumptions only.
tags: ["devnet", "ethereum", "configuration"]
inputs:
  values:
    devnet_name:
      required: true
      description: Source devnet name
      schema: { type: string }
    goal:
      description: Optional goal for the derived config
      schema: { type: string }
    client_type:
      description: Optional client type to preserve explicitly
      schema: { type: string }
    image_hint:
      description: Optional image or build hint to preserve explicitly
      schema: { type: string }
    client_pairs:
      description: Optional explicit client-pair input that should override inferred topology
      schema:
        type: array
        items:
          type: object
          properties:
            el_type: { type: string }
            cl_type: { type: string }
            vc_type: { type: string }
            el_image: { type: string }
            cl_image: { type: string }
            vc_image: { type: string }
            el_extra_params: { type: array, items: { type: string } }
            cl_extra_params: { type: array, items: { type: string } }
            vc_extra_params: { type: array, items: { type: string } }
            count: { type: number }
          required: [el_type, cl_type]
    constraints:
      description: Optional constraints
      schema: { type: string }
    notes_summary:
      description: Concise devnet notes summary
      schema: { type: string }
    notes_highlights:
      schema: { type: array, items: { type: string }, default: [] }
    notes_assumptions:
      schema: { type: array, items: { type: string }, default: [] }
tasks:
  derive:
    quality-gate: "${{ has(outputs.values.profile_summary) && size(outputs.values.profile_summary) > 0 && has(outputs.values.effective_client_pairs) }}"
    instructions: |-
      Derive the smallest participant topology that still preserves the devnet behavior relevant to the goal.
      A worker with reasoning is required.

      Required behavior:
      - Use explicit client_pairs as the primary topology input when provided.
      - Otherwise infer representative client/image combinations from the notes inputs only.
      - Collapse repeated identical client pairs to a single representative pair by default.
      - Use count=1 for each preserved pair unless multiplicity is explicitly required by the goal or constraints.
      - Preserve only config-relevant assumptions, flags, and image hints.
      - Add a fallback pair only when no viable participant pair can be inferred.
    inputs:
      values:
        devnet_name:
          schema: { type: string }
          value: "${{ inputs.values.devnet_name }}"
        goal:
          schema: { type: string }
          value: "${{ inputs.values.?goal.orValue('') }}"
        client_type:
          schema: { type: string }
          value: "${{ inputs.values.?client_type.orValue('') }}"
        image_hint:
          schema: { type: string }
          value: "${{ inputs.values.?image_hint.orValue('') }}"
        client_pairs:
          schema: { type: array, items: { type: object } }
          value: "${{ inputs.values.?client_pairs.orValue([]) }}"
        constraints:
          schema: { type: string }
          value: "${{ inputs.values.?constraints.orValue('') }}"
        notes_summary:
          schema: { type: string }
          value: "${{ inputs.values.?notes_summary.orValue('') }}"
        notes_highlights:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?notes_highlights.orValue([]) }}"
        notes_assumptions:
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?notes_assumptions.orValue([]) }}"
    outputs:
      values:
        profile_summary:
          required: true
          schema: { type: string, description: Concise summary of the representative topology and preserved config-relevant traits }
        assumptions:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Config-relevant assumptions from the source devnet
        effective_client_pairs:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                el_type: { type: string }
                cl_type: { type: string }
                vc_type: { type: string }
                el_image: { type: string }
                cl_image: { type: string }
                vc_image: { type: string }
                el_extra_params: { type: array, items: { type: string } }
                cl_extra_params: { type: array, items: { type: string } }
                vc_extra_params: { type: array, items: { type: string } }
                count: { type: number }
              required: [el_type, cl_type]
            description: Minimal representative participant topology
        fallback_pair_added:
          required: true
          schema: { type: boolean, description: Whether a fallback pair was added because no viable participant pair could be inferred }
outputs:
  values:
    profile_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.derive.outputs.values.profile_summary }}"
    assumptions:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.derive.outputs.values.assumptions }}"
    effective_client_pairs:
      required: true
      schema: { type: array, items: { type: object } }
      value: "${{ tasks.derive.outputs.values.effective_client_pairs }}"
    fallback_pair_added:
      required: true
      schema: { type: boolean }
      value: "${{ tasks.derive.outputs.values.fallback_pair_added }}"
