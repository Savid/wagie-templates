kind: Template
schemaVersion: wagie/v1
id: dev.wagie/devnet-snapshot
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when you have a Kurtosis ethereum-package config and want to launch it on a remote panda-compute sandbox and capture VM snapshots at chosen epochs, returning the sandbox id and per-epoch snapshot ids.
tags: ["kurtosis", "ethereum", "ethpandaops", "ethereum-package", "devnet", "snapshot", "epoch", "panda-compute", "sandbox", "remote"]
inputs:
  values:
    devnet:
      required: true
      description: Devnet name this network represents, used for snapshot notes
      schema: { type: string }
    snapshot_epochs:
      description: Epochs to snapshot at, ascending, e.g. [0, 5, 10]. Epoch 0 captures the fresh network.
      schema: { type: array, items: { type: number }, default: [0] }
    compute_template:
      description: Optional override forcing a specific compute template. When unset, the runbook discovers and picks the sandbox template via its templates listing.
      schema: { type: string }
    package_ref:
      description: Optional override for the Kurtosis package reference. When unset, the ethereum-package default from the Kurtosis runbooks applies.
      schema: { type: string }
    sandbox_ttl:
      description: Optional sandbox TTL (e.g. 2h) to bound the VM lifetime
      schema: { type: string }
  artifacts:
    config:
      required: true
      contentType: text/yaml
      description: Kurtosis ethereum-package args-file to launch on the sandbox
tasks:
  provision:
    quality-gate: "${{ has(outputs.values.sandbox_id) && size(outputs.values.sandbox_id) > 0 }}"
    instructions: |-
      Provision a compute sandbox to host the devnet. Do not launch the network
      yet.

      Follow the runbook that owns the panda-compute devnet lifecycle (find it
      via `panda search runbooks "compute sandbox snapshot lifecycle"`). Pick a
      sandbox template from its capability-check listing unless a
      `compute_template` override is supplied, pass the `sandbox_ttl` when
      given, and poll the operation until the sandbox is ready.

      Return the sandbox id.
    inputs:
      values:
        compute_template:
          schema: { type: string }
          value: "${{ inputs.values.?compute_template.orValue('') }}"
        sandbox_ttl:
          schema: { type: string }
          value: "${{ inputs.values.?sandbox_ttl.orValue('') }}"
    outputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string, description: panda-compute sandbox id }
  deploy_and_snapshot:
    needs: [provision]
    quality-gate: "${{ outputs.values.network_ready && size(outputs.values.snapshots) > 0 }}"
    instructions: |-
      Launch the Kurtosis ethereum devnet on the sandbox and capture VM
      snapshots at the target epochs. This is one time-sensitive flow — do not
      split launch from snapshotting, and pre-compute each epoch's snapshot
      time before launching so early epochs are not missed.

      Follow the runbook that owns the panda-compute devnet lifecycle (via
      `panda search runbooks "epoch aligned snapshot restore"`): it owns the
      launch from the `config` artifact, epoch alignment and timing, async
      polling, and metadata. Honor a `package_ref` override when supplied.

      Record one `{ epoch, snapshot }` per target, in ascending order.
    inputs:
      values:
        sandbox_id:
          required: true
          schema: { type: string }
          value: "${{ tasks.provision.outputs.values.sandbox_id }}"
        package_ref:
          schema: { type: string }
          value: "${{ inputs.values.?package_ref.orValue('') }}"
        snapshot_epochs:
          required: true
          schema: { type: array, items: { type: number } }
          value: "${{ inputs.values.?snapshot_epochs.orValue([0]) }}"
        devnet:
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
      artifacts:
        config:
          ref: inputs.artifacts.config
    outputs:
      values:
        network_ready:
          required: true
          schema: { type: boolean, description: True if the network reached genesis and is producing blocks }
        snapshots:
          required: true
          schema:
            type: array
            items:
              type: object
              properties:
                epoch: { type: number }
                snapshot: { type: string }
              required: [epoch, snapshot]
            description: Snapshot id captured at each target epoch, in order
outputs:
  values:
    sandbox_id:
      required: true
      schema: { type: string }
      value: "${{ tasks.provision.outputs.values.sandbox_id }}"
    snapshots:
      required: true
      schema:
        type: array
        items:
          type: object
          properties:
            epoch: { type: number }
            snapshot: { type: string }
          required: [epoch, snapshot]
      value: "${{ tasks.deploy_and_snapshot.outputs.values.snapshots }}"
