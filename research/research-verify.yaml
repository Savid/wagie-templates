kind: Template
schemaVersion: wagie/v1
id: dev.wagie/research-verify
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when accumulated research findings need a calibration audit before synthesis; spot-checks sources, probes evidence-claim alignment and missing perspectives, and calibrates confidence, folding in independent adversarial verdicts when provided. Cross-finding critic — pair with per-claim adversarial review for high-stakes claims.
tags: ["research", "verification", "calibration", "audit"]
examples:
  - "audit research claims against their evidence"
  - "calibrate confidence where citations are thin"
  - "find missing perspectives in accumulated evidence"
  - "spot-check the sources behind load-bearing claims"
  - "flag contradictions and unstated assumptions"
inputs:
  values:
    topic:
      required: true
      description: Topic that was researched
      schema: { type: string }
    findings:
      required: true
      description: Accumulated findings to verify
      schema: &research_findings_schema
        type: array
        items:
          type: object
          properties:
            claim:
              type: string
            evidence:
              type: string
            sources:
              type: array
              items:
                type: object
                properties:
                  ref:
                    type: string
                  title:
                    type: string
                  date:
                    type: string
                  quote:
                    type: string
                required: [ref]
            confidence:
              type: number
            source_type:
              type: string
            evidence_strength:
              type: string
            polarity:
              type: string
            corroboration:
              type: number
            contradictions:
              type: string
          required: [claim, evidence, confidence]
    perspectives:
      description: Perspectives used during research planning
      schema: &perspectives_schema
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            rationale:
              type: string
          required: [name]
    adversarial_results:
      description: >-
        Independent refutation verdicts for specific claims, produced by
        adversarial review in fresh contexts. Optional; folded into calibration
        when provided.
      schema: &adversarial_results_schema
        type: array
        items:
          type: object
          properties:
            claim:
              type: string
            verdict:
              type: string
              description: survives | weakened | refuted
            strongest_counterargument:
              type: string
            missing_evidence:
              type: string
          required: [claim, verdict]
tasks:
  verify:
    quality-gate: "${{ size(outputs.values.verified_findings) >= size(inputs.values.findings) && outputs.values.verified_findings.all(f, f.confidence_state == 'unknown' ? !has(f.adjusted_confidence) : has(f.adjusted_confidence)) && size(outputs.values.verification_summary) > 0 }}"
    instructions: |
      You are a rigorous research auditor. Your job is to stress-test
      these findings, not to validate them. Assume every claim might be
      wrong until the evidence convinces you otherwise. A worker with
      tool-use (web search and source retrieval) is required: spot-check
      the sources behind the most load-bearing claims by ref rather than
      auditing prose alone.

      Every input finding must reappear in verified_findings — calibrate,
      never drop, and preserve each finding's sources, source_type,
      evidence_strength, and polarity as given.

      Step 1 — Evidence-claim alignment:
      For each finding, assess whether the stated evidence actually
      supports the claim at the stated confidence level. Flag:
      - Claims where confidence exceeds what the evidence warrants
      - Claims where evidence is vague, circular, or unverifiable
      - Claims whose corroboration count does not match distinct
        entries in sources, or that rely on a single source for a
        strong assertion
      For the highest-stakes claims (high confidence, load-bearing for
      the topic), retrieve the cited refs and check the quote or
      locator against the source. More sources means more scrutiny of
      those sources, not less — fabricated refs hide behind the
      appearance of corroboration, so multi-ref high-confidence claims
      deserve spot-checks as much as single-ref ones.

      Step 2 — Adversarial results:
      If adversarial_results are provided, they are independent
      refutation verdicts produced without the researcher's narrative.
      Weigh them heavily: refuted means confidence must drop sharply or
      become unknown and an issue must be recorded — unless your own
      documented source retrieval overturns the counterargument, in
      which case record both the verdict and the retrieval that answers
      it; weakened means a concrete unresolved concern to reflect in
      the rationale; survives corroborates internal coherence only —
      the reviewers could not retrieve sources, so it must not raise
      confidence in unchecked citations.

      Step 3 — Adversarial probing:
      Actively challenge the research by asking:
      - What evidence would contradict the strongest conclusions?
      - Which perspectives or stakeholders are not represented?
      - What assumptions are unstated but load-bearing?
      - Are there temporal, geographic, or methodological blind spots?

      Step 4 — Contradiction audit:
      Identify findings that conflict with each other. For each
      conflict, determine whether it reflects genuine disagreement
      in the evidence or a flaw in the research.

      Step 5 — Confidence calibration:
      Adjust confidence scores based on your audit:
      - Increase confidence where evidence is strong but was
        conservatively scored
      - Decrease confidence where evidence is weak but was
        aggressively scored
      - When the evidence cannot honestly support any number, set
        confidence_state to unknown and omit adjusted_confidence —
        do not invent a value

      Step 6 — Open questions:
      List substantive questions that the research did not answer
      and could not reasonably be expected to answer with available
      sources. Distinguish these from gaps that further research
      could fill.

      Do NOT soften your assessment. If findings are well-supported,
      say so directly. If they are weak, say that directly too.
    inputs:
      values:
        topic:
          schema: { type: string }
          value: "${{ inputs.values.topic }}"
        findings:
          required: true
          schema: *research_findings_schema
          value: "${{ inputs.values.findings }}"
        perspectives:
          schema: *perspectives_schema
          value: "${{ inputs.values.?perspectives.orValue([]) }}"
        adversarial_results:
          schema: *adversarial_results_schema
          value: "${{ inputs.values.?adversarial_results.orValue([]) }}"
    outputs:
      values:
        verified_findings:
          required: true
          schema: &verified_findings_schema
            type: array
            items:
              type: object
              properties:
                claim:
                  type: string
                evidence:
                  type: string
                sources:
                  type: array
                  items:
                    type: object
                    properties:
                      ref:
                        type: string
                      title:
                        type: string
                      date:
                        type: string
                      quote:
                        type: string
                    required: [ref]
                original_confidence:
                  type: number
                adjusted_confidence:
                  type: number
                  description: Omitted when confidence_state is unknown
                confidence_state:
                  type: string
                  enum: [calibrated, unknown]
                  description: unknown when the evidence cannot honestly support any numeric confidence
                confidence_rationale:
                  type: string
                source_type:
                  type: string
                evidence_strength:
                  type: string
                polarity:
                  type: string
                corroboration:
                  type: number
                contradictions:
                  type: string
              required: [claim, evidence, sources, original_confidence, confidence_state, confidence_rationale]
            description: Findings with calibrated confidence scores; sources may be empty only for inference or negative findings
        issues:
          required: true
          schema: &verification_issues_schema
            type: array
            items:
              type: object
              properties:
                type:
                  type: string
                  enum: [over-confident, under-supported, contradiction, missing-perspective, unstated-assumption, refuted]
                description:
                  type: string
                affected_claims:
                  type: array
                  items:
                    type: string
                severity:
                  type: string
                  enum: [high, medium, low]
              required: [type, description, severity]
            description: Problems found during verification
        open_questions:
          required: true
          schema:
            type: array
            items:
              type: string
            description: Substantive questions the research could not answer
        verification_summary:
          required: true
          schema:
            type: string
            description: Overall assessment of research quality and reliability
outputs:
  values:
    verified_findings:
      required: true
      schema: *verified_findings_schema
      value: "${{ tasks.verify.outputs.values.verified_findings }}"
    issues:
      required: true
      schema: *verification_issues_schema
      value: "${{ tasks.verify.outputs.values.issues }}"
    open_questions:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.verify.outputs.values.open_questions }}"
    verification_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.verify.outputs.values.verification_summary }}"
