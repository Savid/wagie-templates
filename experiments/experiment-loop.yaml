kind: Template
schemaVersion: wagie/v1
id: dev.wagie/experiment-loop
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when iteratively tuning any git-tracked artifact in a repo against a scalar metric. Caller only needs to provide `repo_url`, `goal`, and `result_branch`; the setup task clones the repo, discovers or scaffolds the missing pieces (target files, setup command, benchmark, correctness command, metric name) from the goal and repo conventions, then the loop proposes → applies → checks → measures → keeps-or-reverts greedily until a patience window of no-improvement or max iterations. Works for code performance, SQL queries, prompts, configs, ML training loops, Docker image size, or any repo that can emit a scalar from a shell command. Any of the discovered parameters can be overridden by the caller when they are known up front.
tags: ["experiment", "optimization", "hillclimb", "benchmark", "autonomous", "autoresearch", "metric"]
inputs:
  values:
    repo_url:
      required: true
      description: Git URL of the repo to clone (SSH or HTTPS). Worker must have fetch and push credentials.
      schema: { type: string }
    base_branch:
      description: Branch to start from
      schema: { type: string, default: main }
    result_branch:
      required: true
      description: Branch name to push the final accumulated state to (e.g. `autoresearch/run-2026-04-14`)
      schema: { type: string }
    setup_command:
      description: Optional override for the one-time setup command run after clone (e.g. `pnpm install && pnpm build`). Empty means the setup task discovers or skips based on repo conventions.
      schema: { type: string, default: "" }
    target_files:
      description: Optional override listing files the agent may modify. Empty means the setup task infers scope from the goal and repo. Keep tight when provided; exclude bench/test files that scoring depends on.
      schema:
        type: array
        default: []
        items:
          type: string
    correctness_command:
      description: Optional override for the correctness gate command (e.g. `pnpm test src/parser`). Empty means the setup task discovers or scaffolds tests covering the target, or disables the gate if the domain doesn't need one (e.g. Karpathy-style ML where a broken model produces bad metric naturally).
      schema: { type: string, default: "" }
    experiment_command:
      description: Optional override for the command that runs the experiment and emits the scalar metric (e.g. `pnpm bench:parser --json`, `uv run train.py`). Empty means the setup task discovers or scaffolds a benchmark.
      schema: { type: string, default: "" }
    metric_name:
      description: Optional override for the metric label the worker extracts from experiment output (e.g. `val_bpb`, `ns_per_op_parseJson`). Empty means the setup task derives one from the scaffolded/discovered benchmark.
      schema: { type: string, default: "" }
    metric_direction:
      description: Whether lower or higher metric values are better
      schema:
        type: string
        default: minimize
        enum: [minimize, maximize]
    goal:
      required: true
      description: Natural-language description of what to optimize and why. Passed to the proposer each round.
      schema: { type: string }
    max_iterations:
      description: Hard cap on experiment rounds
      schema: { type: number, default: 20 }
    patience:
      description: Stop after this many consecutive rounds with no accepted improvement. Must be strictly less than `max_iterations` or the loop can never converge before hitting the cap.
      schema: { type: number, default: 5 }
    plateau_patience:
      description: Stop after this many consecutive rounds where the measured metric does not move outside the noise band of the current best (within `noise_epsilon`). Catches the case where the metric saturates at a floor (e.g. memoization cache hits, timer resolution) and every round becomes a tie.
      schema: { type: number, default: 3 }
    noise_epsilon:
      description: Relative tolerance used both as an acceptance threshold and a plateau detector. A round is considered "no movement" when `|new - best| <= noise_epsilon * max(|baseline|, 1)`. Default 0 keeps the strict accept rule. Set above the benchmark's run-to-run jitter when measurements are noisy.
      schema: { type: number, default: 0 }
    auto_cleanup:
      description: Whether to prune the scratch workspace after a successful run. Default off so failed runs stay inspectable.
      schema: { type: boolean, default: false }
tasks:
  experiment:
    inputs:
      values:
        repo_url:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.repo_url }}"
        base_branch:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?base_branch.orValue('main') }}"
        result_branch:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.result_branch }}"
        setup_command:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?setup_command.orValue('') }}"
        target_files:
          required: true
          schema: { type: array, items: { type: string } }
          value: "${{ inputs.values.?target_files.orValue([]) }}"
        correctness_command:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?correctness_command.orValue('') }}"
        experiment_command:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?experiment_command.orValue('') }}"
        metric_name:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.?metric_name.orValue('') }}"
        metric_direction:
          required: true
          schema: { type: string, enum: [minimize, maximize] }
          value: "${{ inputs.values.?metric_direction.orValue('minimize') }}"
        goal:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.goal }}"
        max_iterations:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.?max_iterations.orValue(20) }}"
        patience:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.?patience.orValue(5) }}"
        plateau_patience:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.?plateau_patience.orValue(3) }}"
        noise_epsilon:
          required: true
          schema: { type: number }
          value: "${{ inputs.values.?noise_epsilon.orValue(0) }}"
        auto_cleanup:
          required: true
          schema: { type: boolean }
          value: "${{ inputs.values.?auto_cleanup.orValue(false) }}"
    tasks:
      setup:
        quality-gate: "${{ has(outputs.values.baseline_metric) && has(outputs.values.baseline_commit) && size(outputs.values.baseline_commit) > 0 && has(outputs.values.workspace_path) && size(outputs.values.workspace_path) > 0 && has(outputs.values.effective_target_files) && size(outputs.values.effective_target_files) > 0 && has(outputs.values.effective_experiment_command) && size(outputs.values.effective_experiment_command) > 0 && has(outputs.values.effective_metric_name) && size(outputs.values.effective_metric_name) > 0 }}"
        instructions: |-
          Prepare a clean scratch workspace AND resolve all missing experiment parameters from the repo itself. Leadership only knows the repo URL and the goal; you have the cloned code, so you own discovery. The scaffolded benchmark *is* the scoring contract for the entire run — a sloppy bench will produce a meaningless run no matter how good the proposer is. Treat this task as the most important one in the loop.

          Step 0 — Validate inputs.
          - `patience` MUST be strictly less than `max_iterations`. If `patience >= max_iterations`, the loop's no-improvement exit can never trigger before the hard cap, so the run will burn the full budget on plateaus. Fail this task with a clear error: `patience (X) must be < max_iterations (Y)`.
          - `plateau_patience` should be at least 2 and strictly less than `max_iterations`. If invalid, fail with a clear error.
          - `noise_epsilon` must be >= 0. If negative, fail.

          Step 1 — Clone and branch.
          - Clone `repo_url` into the current directory.
          - Check out `base_branch`. Create local branch `result_branch` from it.
          - Capture the **absolute path** of the clone root and return it as `workspace_path`.

          Step 2 — Resolve each parameter. For each field below, honour the caller-provided value when it is non-empty; otherwise derive it from the repo and goal.

          `effective_setup_command`:
          - If `setup_command` was provided, use it.
          - Else detect the project's conventional install/build sequence by reading the manifest files at the repo root (package manager lockfile, project config, Makefile). Use the project's idiomatic command. If nothing is obviously needed, return `""`.

          `effective_target_files` (the **mutable** scope):
          - If `target_files` was provided (non-empty), use it.
          - Else read the repo + goal and identify the artifact being optimized. Prefer the narrowest scope that covers the goal. Profile-guided where possible: include hot helpers the target plausibly dominates through; exclude obviously cold callees.
          - Hard rule: this list must NOT contain any file the benchmark or correctness command reads as scoring input. Mutable code and frozen scoring code are disjoint. The proposer must never be able to edit its own scorer.

          `effective_experiment_command` and `effective_metric_name` (the **frozen** scoring contract):
          - If `experiment_command` was provided, use it (the caller has decided). If `metric_name` was also provided, use it; otherwise infer from the command's output format.
          - Else first try to discover an existing benchmark in the project's conventional framework. If you find one that already targets the goal's artifact and reports a meaningful scalar, use it.
          - Else scaffold one. **Before writing a single line, read the docs for the benchmarking framework you intend to use** (web search the framework's "best practices" / "guidelines" / "common pitfalls" page — every mature harness has one) and apply the framework's anti-pitfall guidance. Generic scaffolding rules that apply in every language and domain follow below.

          The frozen-vs-mutable separation:
          - The benchmark file and any helper data it depends on are FROZEN. They are committed in this setup step and the proposer is forbidden from editing them. Place them outside `effective_target_files`.
          - The metric is the loop's accept/revert oracle. If the oracle is gameable, the loop will game it instead of solving the goal. Karpathy's autoresearch enforces this with a separate frozen `prepare.py` containing the eval function — borrow that pattern: scoring lives in files the agent cannot touch.

          Anti-patterns the scaffolded benchmark MUST avoid (these traps cause the metric to plateau at a meaningless saturation point and turn the loop into noise):
          - **Repeated identical inputs in a tight loop**: if you call the target N times with the same arguments, a one-line memoization will pin every subsequent call to a cache hit. Vary inputs across iterations, or invalidate caches between runs, or measure cold-start cost explicitly. If the goal is specifically to measure cache-hit fast-path, name the metric for that and add a parallel cold-path metric so the optimizer cannot collapse one onto the other.
          - **Dead-code elimination**: optimizing compilers/JITs may notice the target's return value is unused and eliminate the call entirely. Always consume the result — sum it, write it to a sink, return it from the bench function, write it to a side-effecting variable (a `volatile`, a global, a printed line). Pick whatever idiom the chosen framework prescribes.
          - **Constant folding**: hardcoded inputs may be computed at compile time. Construct inputs with runtime randomness (seeded for reproducibility) or read from a fixture file.
          - **No warmup**: first invocations include JIT compilation, lazy module loading, page faults, branch predictor cold start. Run an explicit warmup phase BEFORE timing and discard those samples. Most frameworks have a `Warmup` or equivalent decorator — use it.
          - **Single-run measurement**: a single sample is dominated by noise. Measure N times and report the median (preferred) or trimmed mean. Choose N so total measurement runtime is at least 1-2 seconds, but bench duration stays under ~30s per round so the loop can iterate fast.
          - **Resolution underflow / formatting truncation**: if the operation completes in less time than your timer's resolution, you'll measure 0. If you format the metric with limited decimal precision (e.g. `.toFixed(3)` on milliseconds for a 100ns operation), you'll print 0. Pick units and precision such that the baseline reads ~3-5 significant digits above the timer's resolution. If the operation is too fast, batch it into the timed region (call N times under one start/stop) and divide.
          - **Setup time bleeding into measurement**: only the call-under-test should be inside the timed region. Construct fixtures, allocate buffers, and warm caches *before* `start = clock()`.
          - **Ambiguous output**: emit the metric on a single line in a regex-grabbable form (`metric_name: <number>`) at the end of the run. Downstream extraction is intentionally dumb — one regex, no JSON parsing, no walking results trees. Borrow Karpathy's pattern: print a `---` separator then the metric line.
          - **Mixing wall clock with CPU time**: pick one. Wall clock is honest for end-user latency, CPU time is honest for compute-bound work. Document which.
          - **Coarse-grained metric for fine-grained changes**: if rounds change individual instructions but the metric measures end-to-end latency dominated by I/O, the signal-to-noise will be terrible. Make the bench narrow enough that the proposer's plausible changes move the metric.

          Per-domain hints (apply when relevant, do NOT shoehorn):
          - Code performance: time a function under representative workload. Vary inputs across iterations. Median-of-N. Warmup. Consume return value.
          - SQL / query optimization: time the query against a fixed, restored fixture dataset. Run `EXPLAIN` or equivalent to ensure the plan is real, not a cache hit. Reset query cache between runs if the engine has one.
          - Prompt / LLM tuning: metric is task accuracy or rubric score on a held-out eval set. Eval set is FROZEN. Score with a deterministic scorer (string match, regex, judge model with seed and temp 0).
          - Config / hyperparameter tuning: metric is downstream task performance, measured with the same protocol the goal cares about. Held-out split, multiple seeds if cheap.
          - ML training loop: metric is val loss / val metric on a pinned held-out split, measured under a fixed wall-clock or step budget so runs are comparable. Eval split MUST never be in the training set. Karpathy's autoresearch is the canonical example here: `VAL_SHARD = MAX_SHARD` lives in frozen code.
          - Artifact size (Docker images, bundles, binaries): metric is `size_bytes` after a clean build. Cache invalidation is critical — measure from a clean state.

          When you finish drafting the scaffolded benchmark, do a five-line self-review against the anti-pattern list above. If the bench fails any of them, revise before committing.

          `effective_correctness_command`:
          - If `correctness_command` was provided, use it.
          - Else detect existing tests that cover the target. If found, construct the invocation that runs the relevant subset.
          - If no tests cover the target and the domain warrants correctness checking (most domains except those where a broken artifact naturally produces a bad metric — ML, generative quality scoring), scaffold minimal tests that capture current observable behaviour of the target. Commit them. Use their invocation.
          - The correctness command file(s), like the benchmark, are FROZEN scoring inputs. Place them outside `effective_target_files`.
          - If the domain does not need a correctness gate, return `""`.

          Step 3 — Execute setup.
          - If `effective_setup_command` is non-empty, run it. Fail the task if setup fails.

          Step 4 — Commit scaffolding.
          - Any bench or test files you scaffolded in Step 2 must be committed before step 5. Use a clear commit message like `scaffold: add autoresearch bench for <target>`.

          Step 5 — Baseline measurement and sanity checks.
          - Run `effective_experiment_command` once. Extract the scalar labelled `effective_metric_name`. Return it as `baseline_metric`.
          - Sanity-check the baseline before declaring success. Reject these and revise your scaffold:
            - Baseline is exactly 0, NaN, infinity, or a degenerate value the metric direction makes uninteresting (e.g. `0` for a `minimize` metric — the loop has no headroom).
            - Baseline is at or below the noise floor of the chosen measurement (e.g. wall-clock under one millisecond on a millisecond-precision timer; perfect score on a tiny eval set).
            - Re-running the bench once more produces a value that disagrees with the first by more than ~30% (if so, your noise is huge — increase iteration count or use a more deterministic scorer).
          - If extraction fails or sanity checks fail, the quality-gate will reject this setup — revise your scaffold or extraction strategy and retry.

          Step 6 — Return state.
          - `baseline_commit`: the current HEAD sha after setup + scaffolding but before any experiment try commits.
          - `workspace_summary`: a short note describing repo state, any scaffolding, the chosen metric, and the baseline value with a one-sentence assessment of measurement quality (e.g. `noise = ±0.5%`, `single run, wall clock`).

          Do not delete the workspace at the end of this task.

          This task clones the repo, runs shell commands, and may web-search benchmark docs — a worker with reasoning and tool-use is required.
        inputs:
          values:
            repo_url:
              schema: { type: string }
              value: "${{ inputs.values.repo_url }}"
            base_branch:
              schema: { type: string }
              value: "${{ inputs.values.base_branch }}"
            result_branch:
              schema: { type: string }
              value: "${{ inputs.values.result_branch }}"
            goal:
              schema: { type: string }
              value: "${{ inputs.values.goal }}"
            metric_direction:
              schema: { type: string }
              value: "${{ inputs.values.metric_direction }}"
            setup_command:
              schema: { type: string }
              value: "${{ inputs.values.setup_command }}"
            target_files:
              schema: { type: array, items: { type: string } }
              value: "${{ inputs.values.target_files }}"
            correctness_command:
              schema: { type: string }
              value: "${{ inputs.values.correctness_command }}"
            experiment_command:
              schema: { type: string }
              value: "${{ inputs.values.experiment_command }}"
            metric_name:
              schema: { type: string }
              value: "${{ inputs.values.metric_name }}"
            max_iterations:
              schema: { type: number }
              value: "${{ inputs.values.max_iterations }}"
            patience:
              schema: { type: number }
              value: "${{ inputs.values.patience }}"
            plateau_patience:
              schema: { type: number }
              value: "${{ inputs.values.plateau_patience }}"
            noise_epsilon:
              schema: { type: number }
              value: "${{ inputs.values.noise_epsilon }}"
        outputs:
          values:
            baseline_metric:
              required: true
              schema:
                type: number
                description: Scalar metric measured on the baseline commit before any experiments
            baseline_commit:
              required: true
              schema:
                type: string
                description: Git sha of the starting point (after any scaffolding, before the loop runs)
            workspace_path:
              required: true
              schema:
                type: string
                description: Absolute path to the cloned repo root
            workspace_summary:
              required: true
              schema:
                type: string
                description: Short summary of the prepared workspace
            effective_setup_command:
              required: true
              schema:
                type: string
                description: The setup command that was ultimately used (caller override or discovered)
            effective_target_files:
              required: true
              schema:
                type: array
                items: { type: string }
                description: Resolved editable scope the loop will operate on
            effective_correctness_command:
              required: true
              schema:
                type: string
                description: Resolved correctness command; empty means gate disabled
            effective_experiment_command:
              required: true
              schema:
                type: string
                description: Resolved experiment command producing the scalar metric
            effective_metric_name:
              required: true
              schema:
                type: string
                description: Resolved metric label extracted from experiment output
            scaffolding_notes:
              required: true
              schema:
                type: string
                description: Human-readable note on any bench or test files that were scaffolded
      optimize:
        needs: [setup]
        uses: dev.wagie/optimize-loop@1.0.0
        inputs:
          values:
            objective:
              value: "${{ inputs.values.goal }}"
            metric_name:
              value: "${{ tasks.setup.outputs.values.effective_metric_name }}"
            metric_direction:
              value: "${{ inputs.values.metric_direction }}"
            initial_state:
              value: "${{ tasks.setup.outputs.values.baseline_commit }}"
            initial_metric:
              value: "${{ tasks.setup.outputs.values.baseline_metric }}"
            max_iterations:
              value: "${{ inputs.values.max_iterations }}"
            patience:
              value: "${{ inputs.values.patience }}"
            plateau_patience:
              value: "${{ inputs.values.plateau_patience }}"
            noise_epsilon:
              value: "${{ inputs.values.noise_epsilon }}"
            method:
              value: |-
                ${{
                  "Every git and shell command in this loop runs inside the cloned repo at " + tasks.setup.outputs.values.workspace_path + " — cd there before doing anything.\n\n" +
                  "PROPOSE + APPLY (in the step):\n" +
                  "- Edit ONLY these files: " + tasks.setup.outputs.values.effective_target_files.join(", ") + ". Never edit a benchmark, test, or correctness file, even if it appears in that list.\n" +
                  "- Stage and commit the change with a message shaped 'try: <one-line change>'. The candidate_state you return is the sha of this try commit.\n\n" +
                  "VALIDITY (in the step):\n" +
                  (size(tasks.setup.outputs.values.effective_correctness_command) > 0
                    ? "- Run the correctness gate: `" + tasks.setup.outputs.values.effective_correctness_command + "`. If it exits non-zero, set valid=false, report the current best_metric as candidate_metric, and do NOT run the measurement.\n"
                    : "- There is no correctness gate; treat every applied candidate as valid.\n") +
                  "\nMEASURE (in the step, only when valid):\n" +
                  "- Run: `" + tasks.setup.outputs.values.effective_experiment_command + "`.\n" +
                  "- Extract the scalar labelled '" + tasks.setup.outputs.values.effective_metric_name + "' from its output — prefer a `name: value` or `name=value` line, else a JSON key, else the last numeric occurrence. Report it as candidate_metric (a number).\n\n" +
                  "KEEP / REVERT (in the enact):\n" +
                  "- To keep, leave HEAD as it is — the try commit stays.\n" +
                  "- To revert, discard the try commit and return the repo to the best state with `git reset --hard <best_state>`, where best_state is the best commit sha you are given."
                }}
      finalize:
        needs: [optimize, setup]
        quality-gate: "${{ has(outputs.values.result_branch_url) && size(outputs.values.result_branch_url) > 0 && has(outputs.values.exit_reason) && size(outputs.values.exit_reason) > 0 }}"
        instructions: |-
          Before anything else, `cd` into `workspace_path`. The git push and any commands in this task run relative to that directory.

          Finalize the experiment run. The reader of these artifacts is leadership trying to decide whether to ship the kept changes and whether to trust this loop's verdict — write for them.

          Step 1 — Push.
          - Push HEAD to `result_branch` on `origin`. Force-push is acceptable if the branch already exists from a prior run.
          - Record the resulting branch URL (e.g. https://github.com/owner/repo/tree/<branch>) as `result_branch_url`.

          Step 2 — TSV artifact.
          - Write the accumulated `experiment_log` to the `experiment_log_artifact` slot, preserving iteration order. This is the raw ledger; do not summarise or reorder it.

          Step 3 — Determine the exit reason. Pick exactly one and return it as `exit_reason`:
          - `improvement`: best_metric is meaningfully better than baseline (in goal direction) AND `converged == true` is not from a plateau.
          - `patience`: the loop exited because `no_improvement_streak` hit `patience` — proposer ran out of useful ideas.
          - `plateau`: the loop exited because `plateau_streak` hit `plateau_patience` — the metric stopped responding (often a sign the bench is saturated, not that the goal is solved).
          - `max_iterations`: hit the hard cap without converging.
          - `no_improvement`: ran the full budget but best_metric never moved off baseline.
          You can disambiguate `patience` vs `plateau` by inspecting the trailing rows of `experiment_log` — repeated identical metric values point at plateau; varying metrics with no acceptances point at patience.

          Step 4 — Progress report (`progress_report` artifact, markdown).
          - Render a markdown document with these sections:
            - **Run summary**: goal, metric (with direction), baseline value, best value, absolute and percent improvement, exit reason, total rounds, accepted, reverted.
            - **Resolved parameters**: effective_target_files (as a code-fenced list), effective_experiment_command, effective_metric_name, effective_correctness_command, scaffolding_notes if non-empty.
            - **Iteration table**: one row per iteration, columns: `#`, `decision`, `correctness`, `metric`, `best`, `description`. Build this from `experiment_log` (it is already TSV; transpose into a markdown table). Highlight the row whose metric became the new best (e.g. bold the metric value).
            - **Progress visualisation**: this is the headline artefact — modeled on Karpathy's `progress.png` (https://github.com/karpathy/autoresearch/blob/master/progress.png), a chart of best-so-far across iterations. Try the following in order, stop at the first that succeeds, and embed the result in the markdown:
              1. If `gnuplot` is available (`command -v gnuplot`), generate `progress.png` from the TSV (best-so-far line per iteration; prefer dual-line: per-round metric as light dots and best-so-far as a bold line; clearly mark accept vs revert markers if feasible). Embed via `![progress](progress.png)`.
              2. Else if `python3` is available with `matplotlib` (probe with `python3 -c 'import matplotlib'`), generate `progress.png` the same way and embed it.
              3. Else if any other charting tool is in PATH that you recognise (R + ggplot2, plotly-cli, etc.), use it.
              4. Fallback: emit an ASCII sparkline of best-so-far across iterations in a fenced code block (one character per iteration).
            - The chart and the iteration table are both produced — the chart is the at-a-glance signal, the table is the receipts.
            - **Convergence note**: 2-3 sentence assessment. Did the loop converge cleanly, plateau early, or burn budget? If `exit_reason == plateau`, explicitly call out that the bench may have saturated and recommend whether the run is trustworthy.
            - **Best commit & branch**: best_commit sha and result_branch_url.

          Step 5 — Concise summary (`summary` artifact, markdown).
          - A 6-12 line executive summary suitable for a PR description: goal, the change in one sentence, baseline → best, exit reason, link to result branch and progress report.

          Both the summary and the progress report are markdown artifacts. The progress report is the in-depth read; the summary is the elevator pitch.

          Requires a worker with tool-use and reasoning.
        inputs:
          values:
            workspace_path:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.workspace_path }}"
            repo_url:
              schema: { type: string }
              value: "${{ inputs.values.repo_url }}"
            result_branch:
              schema: { type: string }
              value: "${{ inputs.values.result_branch }}"
            goal:
              schema: { type: string }
              value: "${{ inputs.values.goal }}"
            metric_name:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.effective_metric_name }}"
            metric_direction:
              schema: { type: string }
              value: "${{ inputs.values.metric_direction }}"
            effective_target_files:
              schema: { type: array, items: { type: string } }
              value: "${{ tasks.setup.outputs.values.effective_target_files }}"
            effective_experiment_command:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.effective_experiment_command }}"
            effective_correctness_command:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.effective_correctness_command }}"
            scaffolding_notes:
              schema: { type: string }
              value: "${{ tasks.setup.outputs.values.scaffolding_notes }}"
            baseline_metric:
              schema: { type: number }
              value: "${{ tasks.setup.outputs.values.baseline_metric }}"
            best_metric:
              schema: { type: number }
              value: "${{ tasks.optimize.outputs.values.best_metric }}"
            best_commit:
              schema: { type: string }
              value: "${{ tasks.optimize.outputs.values.best_state }}"
            accepted_count:
              schema: { type: number }
              value: "${{ tasks.optimize.outputs.values.accepted_count }}"
            reverted_count:
              schema: { type: number }
              value: "${{ tasks.optimize.outputs.values.reverted_count }}"
            experiment_log:
              schema: { type: string }
