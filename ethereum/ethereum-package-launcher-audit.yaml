kind: Template
schemaVersion: wagie/v1
id: dev.wagie/ethereum-package-launcher-audit
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when Ethereum client source analysis is weak or missing and a narrow fallback audit against ethereum-package launcher configuration is needed.
tags: ["ethereum", "kurtosis", "ethereum-package", "launcher", "package-launcher-audit", "ci", "assertoor"]
inputs:
  values:
    client_name:
      description: Implicated client name from source-dive, such as erigon, reth, besu, geth, lighthouse, prysm, or teku.
      schema: { type: string, default: "" }
    bug_hunt_summary:
      description: Short summary of local reproduction findings, when available.
      schema: { type: string, default: "" }
    root_cause_description:
      description: Source-dive root-cause description to cross-reference against launcher behavior.
      schema: { type: string, default: "" }
  secrets:
    gh_token:
      required: false
      description: Optional GitHub token secret used as GH_TOKEN for gh CLI commands. When unset, use ambient gh authentication.
tasks:
  audit:
    quality-gate: "${{ has(outputs.values.audit_summary) && size(outputs.values.audit_summary) > 0 }}"
    instructions: |-
      Run a narrow caller/tool fallback audit after client-first source analysis could not strongly localize the source surface. You need a worker with tool-use (shell access for gh CLI). The client path has already had first priority; this audit attempts to either reinforce that diagnosis or surface concrete launcher-side invalid input or configuration. The null hypothesis is "the caller/tool is fine" — produce specific code-cited evidence to deviate from it.

      Hard rules:
      - `launcher_concrete_mismatch` requires a specific launcher file:line where ethereum-package passes a CLI flag value, port, or configuration that demonstrably contradicts the implicated client's documented expectations or the cited misbehavior. No citation means no implication.
      - "Could be a flag misconfiguration somewhere" is not evidence. "Missing or default flag X in the launcher means the client runs without setting Y" is evidence only when paired with a concrete client expectation for Y.
      - Recent ethereum-package commits are interesting only when they touched the specific launcher field the client investigation implicated.
      - Default to `client_reinforced`. The bar to deviate is high on purpose because a wrong caller/launcher verdict routes triagers away from a real client regression.

      GitHub authentication:
      - `gh_token` is an optional secret. When present, use it only as the `GH_TOKEN` environment variable for `gh` commands and set `GH_PROMPT_DISABLED=1`.
      - When `gh_token` is absent, use the worker's ambient `gh` authentication (`gh auth status` should pass).
      - Command examples below omit the environment wrapper; apply the authentication environment to every `gh` invocation.
      - Do not run `gh auth login`, `gh auth token`, or `gh auth status --show-token`. Do not print, echo, persist, return, or write the token into files. Keep shell tracing and `GH_DEBUG` disabled while a token is in scope.

      Procedure:
      1. The implicated client is `client_name`. The launch framework is `https://github.com/ethpandaops/ethereum-package`. Identify the client's launch Starlark file, typically under `src/el/<client>/<client>_launcher.star` or `src/cl/<client>/<client>_launcher.star`. Use `gh search code` or `gh api /repos/ethpandaops/ethereum-package/contents/src/el/<client>` to locate.
      2. Fetch each launch file with `gh api "/repos/ethpandaops/ethereum-package/contents/<path>" --jq .content | base64 -d`.
      3. Cross-reference `bug_hunt_summary` and `root_cause_description` against ethereum-package launch behavior:
         - For each specific CLI flag, port, or config knob cited by the client investigation, find where the launcher sets that value.
         - If the launcher's value matches the client's expectation, record `client_reinforced` for that knob.
         - If a launcher value demonstrably mismatches the client's expectation, cite the launcher line and the client's documented expectation; this can support `launcher_concrete_mismatch`.
         - If a knob is silent and the client uses its own default, keep `client_reinforced` unless the client default itself is the cited misbehavior.
      4. Output `audit_summary` covering per-knob analysis, recent relevant commits only when they touched those launcher fields, and a 2-3 sentence bottom line.
      5. Output `verdict` as one of:
         - `client_reinforced`: every cited knob is consistent with what the client expects; the launcher is not the cause.
         - `launcher_concrete_mismatch`: at least one cited knob is demonstrably wrong in the launcher with a specific launcher-file:line citation.
         - `inconclusive`: the launcher file could not be located, or the prior findings do not cite framework-touchable knobs.

      Keep summary to roughly 200-350 words. This is a glance, not a deep dive. Refuse to chase paths outside the implicated launcher files.
    inputs:
      values:
        client_name:
          schema: { type: string }
          value: "${{ inputs.values.?client_name.orValue('') }}"
        bug_hunt_summary:
          schema: { type: string }
          value: "${{ inputs.values.?bug_hunt_summary.orValue('') }}"
        root_cause_description:
          schema: { type: string }
          value: "${{ inputs.values.?root_cause_description.orValue('') }}"
      secrets:
        gh_token:
          ref: inputs.secrets.gh_token
    outputs:
      values:
        audit_summary:
          required: true
          schema: { type: string }
        verdict:
          required: true
          schema:
            type: string
            enum: [client_reinforced, launcher_concrete_mismatch, inconclusive]
outputs:
  values:
    audit_summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.audit.outputs.values.audit_summary }}"
    verdict:
      required: true
      schema: { type: string }
      value: "${{ tasks.audit.outputs.values.verdict }}"
