kind: Template
schemaVersion: wagie/v1
id: dev.wagie/kurtosis-devnet-config
version: "0.1.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when you have an ethpandaops devnet name and want a single ready-to-run
  Kurtosis ethereum-package args-file to reproduce it locally. Discovers the live
  devnet profile through the `panda` CLI and the deployed node inventory / CL
  config (not from static notes), honoring optional steering like a client subset
  or extra tooling, and optionally dry-run-validates the result with kurtosis.
  Head of the panda-compute devnet pipeline that feeds kurtosis-devnet-snapshot
  and kurtosis-devnet-watch.
tags: ["kurtosis", "ethereum", "ethpandaops", "ethereum-package", "devnet", "testnet", "config", "network-params", "args-file", "panda"]
inputs:
  values:
    devnet:
      required: true
      description: Devnet or devnet-group name to model, e.g. glamsterdam-devnet-6
      schema: { type: string }
    steering:
      description: >-
        Optional free-form preferences, e.g. "only lighthouse + geth",
        "minimal 2-node", "include buildoor + assertoor", "pull gloas forward".
      schema: { type: string }
    package_ref:
      description: Kurtosis package reference to target
      schema: { type: string, default: github.com/ethpandaops/ethereum-package }
tasks:
  assemble_config:
    quality-gate: "${{ has(outputs.values.summary) && size(outputs.values.summary) > 0 }}"
    instructions: |-
      Produce ONE runnable ethereum-package Kurtosis config that models the named
      devnet, then write it as the `config` artifact. Use the `panda` CLI.

      Discover the profile, do not guess it. Suggested route (adapt as needed):
      - `panda devnets` / `panda devnets info|forks|endpoints <devnet>` for identity,
        chain id, fork schedule, and live services.
      - `panda resources networks://<devnet>` for the source repo and the
        genesis-artifact host.
      - The node inventory (`.../api/v1/nodes/inventory`) and `.../cl/config.yaml`
        on that host are the ground truth for deployed images, topology, and params.
      - The package's `network_params.yaml` is the source of truth for valid field
        names; tooling attaches via `additional_services` and `*_params`.

      Cross-check sources: deployed inventory and the live CL config win over the
      human notes page, which may describe undecided or aspirational items. Flag
      any inconsistency (e.g. a stray client image tag) rather than copying it.

      Honor `steering` when present: narrow the client matrix, change the node
      count, adjust fork epochs for faster local iteration, or add tooling such as
      a builder, explorer, spammer, or test runner. With no steering, default to a
      faithful but minimal replica.

      If the `kurtosis` CLI is available, test the config with `kurtosis run
      --dry-run --args-file <config> <package_ref>`; it must interpret with no
      errors (checks fields, services, and client types without starting
      containers).

      Emit the config artifact, a short `summary` of the key choices, and the
      `assumptions` you had to make.
    inputs:
      values:
        devnet:
          required: true
          schema: { type: string }
          value: "${{ inputs.values.devnet }}"
        steering:
          schema: { type: string }
          value: "${{ inputs.values.?steering.orValue('') }}"
        package_ref:
          schema: { type: string }
          value: "${{ inputs.values.?package_ref.orValue('github.com/ethpandaops/ethereum-package') }}"
    outputs:
      values:
        summary:
          required: true
          schema: { type: string, description: Short summary of the topology, forks, tooling, and key choices }
        assumptions:
          required: true
          schema:
            type: array
            items: { type: string }
            description: Assumptions or unresolved gaps, including any source inconsistencies found
      artifacts:
        config:
          required: true
          contentType: text/yaml
          description: Single runnable ethereum-package args-file for the devnet
outputs:
  values:
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.assemble_config.outputs.values.summary }}"
    assumptions:
      required: true
      schema: { type: array, items: { type: string } }
      value: "${{ tasks.assemble_config.outputs.values.assumptions }}"
  artifacts:
    config:
      ref: tasks.assemble_config.outputs.artifacts.config
