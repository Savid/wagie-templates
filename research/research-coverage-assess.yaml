kind: Template
schemaVersion: wagie/v1
id: dev.wagie/research-coverage-assess
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when accumulated research needs a structured coverage decision; scores breadth, depth, balance, and conflict resolution, then returns sufficiency state, prioritized gaps, and information gain signal. Research-facing wrapper over the core coverage-assess critic.
tags: ["research", "evaluation", "coverage"]
inputs:
  values:
    topic:
      required: true
      description: Topic being researched
      schema: { type: string }
    depth:
      required: true
      description: Requested research depth
      schema: { type: string }
    findings:
      required: true
      description: Accumulated findings to assess
      schema:
        type: array
        items:
          type: object
          properties:
            claim: { type: string }
            evidence: { type: string }
            confidence: { type: number }
            source_type: { type: string }
            evidence_strength: { type: string }
            corroboration: { type: number }
            contradictions: { type: string }
          required: [claim, evidence, confidence]
    previous_gap_count:
      description: Number of gaps identified in the previous iteration
      schema: { type: number, default: 0 }
    plan_questions:
      description: Original research plan questions to assess coverage against
      schema:
        type: array
        items:
          type: object
          properties:
            question: { type: string }
            perspective: { type: string }
            priority: { type: string }
            difficulty: { type: string }
            rationale: { type: string }
          required: [question]
tasks:
  assess:
    uses: dev.wagie/coverage-assess@1.0.0
    inputs:
      values:
        objective:
          value: "${{ inputs.values.topic }}"
        target_depth:
          value: "${{ inputs.values.depth in ['shallow', 'moderate', 'deep'] ? inputs.values.depth : 'moderate' }}"
        prior_gap_count:
          value: "${{ inputs.values.?previous_gap_count.orValue(0) }}"
        items:
          value: "${{ inputs.values.findings.map(f, {'content': f.claim, 'evidence': f.evidence, 'confidence': f.confidence, 'source_type': f.?source_type.orValue(''), 'strength': f.?evidence_strength.orValue(''), 'corroboration': f.?corroboration.orValue(0.0), 'contradictions': f.?contradictions.orValue('')}) }}"
        plan:
          value: "${{ inputs.values.?plan_questions.orValue([]).map(q, {'item': q.question, 'priority': q.?priority.orValue('')}) }}"
outputs:
  values:
    completeness:
      required: true
      schema: { type: string }
      value: "${{ tasks.assess.outputs.values.completeness }}"
    gaps:
      required: true
      schema:
        type: array
        items:
          type: object
          properties:
            question: { type: string }
            priority: { type: string }
            difficulty: { type: string }
            dimension: { type: string }
          required: [question, priority, difficulty, dimension]
      value: "${{ tasks.assess.outputs.values.gaps }}"
    scores:
      required: true
      schema:
        type: object
        properties:
          breadth: { type: number }
          depth: { type: number }
          balance: { type: number }
          conflict_resolution: { type: number }
        required: [breadth, depth, balance, conflict_resolution]
      value: "${{ tasks.assess.outputs.values.scores }}"
    information_gain:
      required: true
      schema: { type: string }
      value: "${{ tasks.assess.outputs.values.information_gain }}"
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.assess.outputs.values.summary }}"
