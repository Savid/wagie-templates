kind: Template
schemaVersion: wagie/v1
id: dev.wagie/kurtosis-enclave-file-download
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/savid/wagie-templates
repository: https://github.com/savid/wagie-templates
description: >-
  Use when a workflow needs a Kurtosis enclave file locally; downloads a named file such as genesis data or network configs.
tags: ["kurtosis", "ethereum", "ethpandaops", "files"]
inputs:
  values:
    enclave_name:
      required: true
      description: Kurtosis enclave that owns the file
      schema: { type: string }
    file_name:
      required: true
      description: Kurtosis file name to download
      schema: { type: string }
tasks:
  download_file:
    quality-gate: "${{ has(outputs.values.summary) }}"
    instructions: |-
      Download a named file from a Kurtosis enclave.

      Use the `kurtosis` CLI as the primary tool surface for this task. A worker
      with tool-use is required.
      Download the file and write it as the `file` output.
    inputs:
      values:
        enclave_name:
          schema: { type: string }
          value: "${{ inputs.values.enclave_name }}"
        file_name:
          schema: { type: string }
          value: "${{ inputs.values.file_name }}"
    outputs:
      values:
        file:
          required: true
          schema: { type: string, description: Downloaded enclave file }
        summary:
          required: true
          schema: { type: string, description: Short download summary }
outputs:
  values:
    file:
      required: true
      schema: { type: string }
      value: "${{ tasks.download_file.outputs.values.file }}"
    summary:
      required: true
      schema: { type: string }
      value: "${{ tasks.download_file.outputs.values.summary }}"
